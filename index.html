      </div>
    </div>

    <div class="table-wrap" style="display:none;">
      <table class="data-table" id="data-table"></table>
    </div>

<!-- Scripts -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="data-processor.js"></script>
<script src="ui-renderer.js"></script>
<script src="chart-renderer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  window.BT.init();
  window.BT.initTheme();
  window.BT.initKeyboardShortcuts();
  window.BT.renderEmptyState(true);

  function loadFiles(fileList) {
    var files = Array.from(fileList);
    if (!files.length) return;
    window.BT.startMultiImport(files);
  }

  var importBtn = document.getElementById('import-btn');
  var fileInput = document.getElementById('file-input');
  importBtn.addEventListener('click', function () { fileInput.click(); });
  fileInput.addEventListener('change', function (e) {
    loadFiles(e.target.files);
    fileInput.value = '';
  });

  var clearBtn = document.getElementById('clear-btn');
  clearBtn.addEventListener('click', function () {
    if (confirm('Clear all loaded data and start fresh?')) {
      window.BT.clearAllData();
    }
  });

  var dzInput = document.getElementById('file-input-dz');
  dzInput.addEventListener('change', function (e) {
    loadFiles(e.target.files);
    dzInput.value = '';
  });

  var dz = document.getElementById('drop-zone');
  dz.addEventListener('click', function (e) {
    if (e.target !== dzInput) dzInput.click();
  });

  ['dragover','dragenter'].forEach(function (ev) {
    dz.addEventListener(ev, function (e) {
      e.preventDefault();
      dz.classList.add('drag');
    });
  });
  dz.addEventListener('dragleave', function () { dz.classList.remove('drag'); });
  dz.addEventListener('drop', function (e) {
    e.preventDefault();
    dz.classList.remove('drag');
    loadFiles(e.dataTransfer.files);
  });

  document.addEventListener('dragover', function (e) { e.preventDefault(); });
  document.addEventListener('drop', function (e) {
    e.preventDefault();
    if (e.target === dz || dz.contains(e.target)) return;
    loadFiles(e.dataTransfer.files);
  });

  // ── Auto-load bundled CSV (3093-SLAs-Details-16) ───────────────────────
  // The CSV is embedded as base64 so the tracker opens pre-populated.
  // Users can still import additional files or clear and start fresh.
  (function autoLoadBundledCSV() {
    var CSV_FILENAME = '3093-SLAs-Details-16.csv';
    try {
      var b64 = window.__BUNDLED_CSV_B64__;
      if (!b64) return; // no bundled data, user must upload manually
      var bin = atob(b64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      var blob = new Blob([bytes], { type: 'text/csv' });
      var file = new File([blob], CSV_FILENAME, { type: 'text/csv' });
      window.BT.startMultiImport([file]);
    } catch(e) {
      console.warn('Auto-load failed:', e);
    }
  })();
});
</script>
