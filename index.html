<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breaches Tracker</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
<div class="app">
  <nav class="app-nav">
    <a href="index.html" class="active">Breaches Tracker</a>
    <a href="reporter.html">Reporter</a>
  </nav>

  <div class="toolbar">
    <div class="toolbar-left">
      <!-- visible button triggers hidden file input -->
      <button class="file-label" id="import-btn" type="button">Import File</button>
      <input type="file" id="file-input" accept=".csv,.xlsx,.xls"
             style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;">
    </div>
    <div class="btn-group">
      <button class="btn-outline" onclick="window.BT.exportTab(window.BT.trackerState.activeTab)" title="Export current tab (Ctrl+E)">Export Tab</button>
      <button id="export-all-btn" class="btn-outline" onclick="window.BT.exportAll()" title="Export all tabs (Ctrl+Shift+E)" style="display:none">Export All</button>
      <a href="reporter.html" class="btn-outline" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;" title="Open Breaches Reporter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open Reporter
      </a>
    </div>
  </div>

  <div id="status" class="status-bar" style="display:none"></div>

  <div class="tabs-wrapper">
    <div class="tabs" id="tabs-container"></div>
  </div>

  <div class="table-area" id="table-area">
    <!-- Empty / drop-zone state -->
    <div id="drop-zone" class="empty-state" style="cursor:pointer;border:2px dashed var(--color-border);border-radius:12px;padding:48px 32px;transition:border-color .15s,background .15s;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
           style="color:var(--color-text-faint);margin-bottom:12px">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10,9 9,9 8,9"/>
      </svg>
      <p style="font-size:15px;font-weight:500;margin-bottom:6px;">Drop your CSV or XLSX here</p>
      <span style="font-size:12px;color:var(--color-text-faint)">&hellip;or click to browse for a file</span>
    </div>

    <!-- Data table (hidden until file loaded) -->
    <div id="data-table-wrap" style="display:none">
      <div class="table-toolbar">
        <input type="text" id="search-input" placeholder="Search&hellip;" style="width:220px">
        <span id="row-count" class="muted-label"></span>
      </div>
      <div class="table-scroll">
        <table id="data-table">
          <thead id="data-thead"></thead>
          <tbody id="data-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="data-processor.js"></script>
<script src="ui-renderer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  window.BT.init();

  var fileInput = document.getElementById('file-input');
  var dropZone  = document.getElementById('drop-zone');
  var importBtn = document.getElementById('import-btn');

  function loadFile(f) {
    if (f) window.BT.handleFile(f);
  }

  // Toolbar "Import File" button
  if (importBtn) {
    importBtn.addEventListener('click', function () {
      fileInput.click();
    });
  }

  // Hidden file input change
  if (fileInput) {
    fileInput.addEventListener('change', function (e) {
      loadFile(e.target.files[0]);
      fileInput.value = '';
    });
  }

  // Drop-zone click → open picker
  if (dropZone) {
    dropZone.addEventListener('click', function () {
      fileInput.click();
    });

    // Drag visual feedback
    dropZone.addEventListener('dragover', function (e) {
      e.preventDefault();
      dropZone.style.borderColor = 'var(--color-primary)';
      dropZone.style.background  = 'var(--color-primary-highlight)';
    });
    dropZone.addEventListener('dragleave', function () {
      dropZone.style.borderColor = '';
      dropZone.style.background  = '';
    });
    dropZone.addEventListener('drop', function (e) {
      e.preventDefault();
      dropZone.style.borderColor = '';
      dropZone.style.background  = '';
      loadFile(e.dataTransfer.files[0]);
    });
  }

  // Global drag-and-drop fallback (anywhere on the page)
  document.addEventListener('dragover', function (e) { e.preventDefault(); });
  document.addEventListener('drop', function (e) {
    e.preventDefault();
    if (e.target === dropZone || (dropZone && dropZone.contains(e.target))) return;
    loadFile(e.dataTransfer.files[0]);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
      e.preventDefault();
      if (e.shiftKey) window.BT.exportAll();
      else window.BT.exportTab(window.BT.trackerState.activeTab);
    }
  });
});
</script>
</body>
</html>
