<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breaches Tracker</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>
<div class="app">

  <!-- NAV -->
  <nav class="app-nav">
    <a href="index.html" class="active">Breaches Tracker</a>
    <a href="reporter.html">Reporter</a>
    <a href="combined-analyzer.html">Combined Analyzer</a>
    <a href="agent-tracker.html">Agent Tracker</a>
    <a href="pcms-tracker.html">📋 PCms Tracker</a>
    <a href="converter.html">🔄 Converter</a>
  </nav>

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      Breaches Tracker
    </div>
    <div class="header-right">
      <button class="theme-btn" data-theme-toggle aria-label="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- TOOLBAR (hidden until file loaded) -->
  <div class="toolbar" style="display:none;">
    <div class="toolbar-left">
      <button class="btn-outline" id="import-btn" type="button">Import Breaches File</button>
      <input type="file" id="file-input" accept=".csv,.xlsx,.xls" multiple
             style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;">
      <button class="btn-outline" id="clear-btn" type="button"
              style="color:var(--error,#a12c7b);border-color:var(--error,#a12c7b);"
              title="Clear all loaded data and start fresh">Clear All</button>
    </div>
    <div class="btn-group">
      <button class="btn-outline" onclick="window.BT.exportTab(window.BT.trackerState.activeTab)" title="Export current tab (Ctrl+E)">Export Tab</button>
      <button id="export-all-btn" class="btn-outline" onclick="window.BT.exportAll()" style="display:none;">Export All</button>
      <a href="reporter.html" class="btn-outline"
         style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Reporter
      </a>
      <a href="combined-analyzer.html" class="btn-outline"
         style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Combined Analyzer
      </a>
      <a href="agent-tracker.html" class="btn-outline"
         style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Agent Tracker
      </a>
      <a href="pcms-tracker.html" class="btn-outline"
         style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="2"/>
          <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="12" y2="16"/>
        </svg>
        PCms Tracker
      </a>
      <a href="converter.html" class="btn-outline"
         style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="17,1 21,5 17,9"/>
          <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7,23 3,19 7,15"/>
          <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
        Converter
      </a>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:16px;">
      <span id="row-count" style="font-size:12px;color:var(--muted);"></span>
      <input type="text" id="search-input" placeholder="Search&hellip;"
             style="padding:5px 10px;border:1px solid var(--border);border-radius:6px;
                    font-size:12px;background:var(--bg);color:var(--text);width:200px;"
             oninput="window.searchTable && window.searchTable(this.value)">
    </div>
  </div>

  <!-- IMPORT LOG (shown after each multi-file import) -->
  <div id="import-log" style="display:none;
       margin:0 20px 0;padding:10px 14px;
       border-radius:6px;border:1px solid var(--border);
       background:var(--surface);font-size:12px;line-height:1.8;
       color:var(--text);"></div>

  <!-- STATUS BAR -->
  <div id="status" class="status-bar" style="display:none;"></div>

  <!-- KPI AREA -->
  <div id="kpi-area" class="kpis" style="display:none;padding:16px 20px 0;"></div>

  <!-- CHARTS AREA (injected by chart-renderer.js) -->
  <div id="charts-area" style="display:none;"></div>

  <!-- TABS BAR -->
  <div id="tabs-bar" class="tabs-bar" style="display:none;"></div>

  <!-- TABLE AREA -->
  <main class="main" style="padding-top:0;">

    <!-- Empty / drop-zone state -->
    <div id="empty-state">
      <div id="drop-zone" class="upload-zone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17,8 12,3 7,8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h3>Drop your RAW export here</h3>
        <p>Upload one or more <strong>Breaches-file</strong> .xlsx / .xls or <strong>SLAs-Details .csv</strong> from ServiceNow</p>
        <button class="upload-btn">Choose file(s)</button>
        <input type="file" id="file-input-dz" accept=".xlsx,.xls,.csv" multiple>
      </div>
    </div>

    <!-- Data table (shown after file loaded) -->
    <div class="table-wrap" style="display:none;">
      <table class="data-table" id="data-table"></table>
    </div>

  </main>
</div><!-- /app -->

<!-- Scripts -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="data-processor.js"></script>
<script src="ui-renderer.js"></script>
<script src="chart-renderer.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  window.BT.init();
  window.BT.initTheme();
  window.BT.initKeyboardShortcuts();
  window.BT.renderEmptyState(true);

  function loadFiles(fileList) {
    var files = Array.from(fileList);
    if (!files.length) return;
    window.BT.startMultiImport(files);
  }

  var importBtn = document.getElementById('import-btn');
  var fileInput = document.getElementById('file-input');
  importBtn.addEventListener('click', function () { fileInput.click(); });
  fileInput.addEventListener('change', function (e) {
    loadFiles(e.target.files);
    fileInput.value = '';
  });

  var clearBtn = document.getElementById('clear-btn');
  clearBtn.addEventListener('click', function () {
    if (confirm('Clear all loaded data and start fresh?')) {
      window.BT.clearAllData();
    }
  });

  var dzInput = document.getElementById('file-input-dz');
  dzInput.addEventListener('change', function (e) {
    loadFiles(e.target.files);
    dzInput.value = '';
  });

  var dz = document.getElementById('drop-zone');
  dz.addEventListener('click', function (e) {
    if (e.target !== dzInput) dzInput.click();
  });

  ['dragover','dragenter'].forEach(function (ev) {
    dz.addEventListener(ev, function (e) {
      e.preventDefault();
      dz.classList.add('drag');
    });
  });
  dz.addEventListener('dragleave', function () { dz.classList.remove('drag'); });
  dz.addEventListener('drop', function (e) {
    e.preventDefault();
    dz.classList.remove('drag');
    loadFiles(e.dataTransfer.files);
  });

  document.addEventListener('dragover', function (e) { e.preventDefault(); });
  document.addEventListener('drop', function (e) {
    e.preventDefault();
    if (e.target === dz || dz.contains(e.target)) return;
    loadFiles(e.dataTransfer.files);
  });
});
</script>
</body>
</html>
