<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breaches Tracker</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#fff;--border:#d4d1ca;--divider:#dcd9d5;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --primary:#01696f;--primary-h:#0c4e54;--primary-hi:#cedcd8;
  --success:#437a22;--warn:#964219;--error:#a12c7b;
  --shadow:0 4px 16px oklch(0.2 0.01 80/.08);
  --radius:0.5rem;--radius-lg:0.75rem;--font:'Satoshi',sans-serif;
}
[data-theme="dark"]{
  --bg:#171614;--surface:#1c1b19;--surface-2:#201f1d;--border:#393836;--divider:#262523;
  --text:#cdccca;--muted:#797876;--faint:#5a5957;
  --primary:#4f98a3;--primary-h:#227f8b;--primary-hi:#313b3b;
  --success:#6daa45;--warn:#bb653b;--error:#d163a7;
  --shadow:0 4px 16px oklch(0 0 0/.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;font-size:16px;line-height:1.6;transition:background .2s,color .2s}
button{cursor:pointer;font-family:inherit}
.app-nav{background:var(--surface-2);border-bottom:2px solid var(--divider);padding:0 1.5rem;display:flex;align-items:center;gap:0;overflow-x:auto;position:sticky;top:0;z-index:200}
.app-nav a{display:flex;align-items:center;gap:.4rem;padding:.55rem 1rem;font-size:.82rem;font-weight:600;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--muted);text-decoration:none;white-space:nowrap;transition:color .18s}
.app-nav a:hover{color:var(--text)}
.app-nav a.active{color:var(--primary);border-bottom-color:var(--primary)}
.app-nav svg{flex-shrink:0}
.header{background:var(--surface);border-bottom:1px solid var(--divider);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:2.4rem;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:.625rem;font-weight:700;font-size:1.1rem;color:var(--text)}
.logo svg{color:var(--primary)}
.header-right{display:flex;align-items:center;gap:.75rem}
.theme-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);padding:.375rem .625rem;color:var(--muted);display:flex;align-items:center;transition:all .18s}
.theme-btn:hover{border-color:var(--primary);color:var(--primary)}
.main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:3rem 2rem;text-align:center;background:var(--surface);transition:all .2s;cursor:pointer;margin-bottom:2rem}
.upload-zone:hover,.upload-zone.drag{border-color:var(--primary);background:var(--primary-hi)}
.upload-zone svg{margin:0 auto .75rem;color:var(--primary);opacity:.7}
.upload-zone h3{font-size:1.125rem;margin-bottom:.375rem}
.upload-zone p{color:var(--muted);font-size:.9rem}
.upload-btn{display:inline-block;margin-top:1rem;background:var(--primary);color:#fff;border:none;padding:.5rem 1.25rem;border-radius:var(--radius);font-size:.9rem;font-weight:500;transition:background .18s}
.upload-btn:hover{background:var(--primary-h)}
#file-input{display:none}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem;margin-bottom:2rem}
.kpi{background:var(--surface);border:1px solid var(--divider);border-radius:var(--radius-lg);padding:1rem 1.25rem}
.kpi-label{font-size:.8rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem}
.kpi-value{font-size:1.75rem;font-weight:700;color:var(--primary);line-height:1}
.kpi-sub{font-size:.78rem;color:var(--faint);margin-top:.25rem}
.tabs-bar{display:flex;gap:.25rem;overflow-x:auto;border-bottom:2px solid var(--divider);margin-bottom:1.5rem}
.tab-btn{background:none;border:none;padding:.625rem 1rem;font-size:.875rem;font-weight:500;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .18s;border-radius:var(--radius) var(--radius) 0 0}
.tab-btn:hover{color:var(--text);background:var(--surface)}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);background:var(--surface)}
.tab-badge{display:inline-block;background:var(--primary-hi);color:var(--primary);font-size:.72rem;font-weight:700;padding:.1rem .4rem;border-radius:99px;margin-left:.375rem}
.tab-btn.active .tab-badge{background:var(--primary);color:#fff}
.table-wrap{overflow-x:auto;border:1px solid var(--divider);border-radius:var(--radius-lg);background:var(--surface)}
.data-table{width:100%;border-collapse:collapse;font-size:.82rem}
.data-table th{background:var(--surface-2);font-weight:600;color:var(--muted);text-align:left;padding:.5rem .75rem;border-bottom:2px solid var(--divider);white-space:nowrap;position:sticky;top:0;z-index:1}
.data-table td{padding:.4rem .75rem;border-bottom:1px solid var(--divider);vertical-align:top;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--primary-hi)}
.manual-col{background:oklch(from var(--warn) l c h / .06)}
.data-table th.manual-col{background:oklch(from var(--warn) l c h / .1)}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.75rem}
.toolbar-left{display:flex;align-items:center;gap:.5rem;font-size:.875rem;color:var(--muted)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text);padding:.4rem .875rem;border-radius:var(--radius);font-size:.82rem;font-weight:500;display:flex;align-items:center;gap:.375rem;transition:all .18s}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-group{display:flex;gap:.5rem;flex-wrap:wrap}
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty svg{margin:0 auto 1rem;opacity:.3}
.empty h3{font-size:1.1rem;margin-bottom:.375rem;color:var(--text)}
.status-bar{background:var(--success);color:#fff;padding:.625rem 1.5rem;font-size:.875rem;font-weight:500;display:flex;align-items:center;gap:.5rem}
.status-bar.error{background:var(--error)}
@media(max-width:640px){.main{padding:1rem}.kpis{grid-template-columns:repeat(2,1fr)}.header{top:2.2rem}}
</style>
</head>
<body>
<nav class="app-nav">
  <a href="index.html" class="active">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 14h4l3-7 4 14 3-7h3"/></svg>
    Breaches Tracker
  </a>
  <a href="reporter.html">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    Reporter
  </a>
  <a href="agent-tracker.html">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
    Agent Tracker
  </a>
</nav>
<header class="header">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect width="28" height="28" rx="7" fill="currentColor" opacity=".12"/>
      <path d="M7 14h4l3-7 4 14 3-7h3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Breaches Tracker
  </div>
  <div class="header-right">
    <button class="btn-outline" id="export-all-btn" style="display:none" onclick="exportAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export All
    </button>
    <button class="theme-btn" data-theme-toggle aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>
<div id="status" style="display:none" class="status-bar"></div>
<main class="main">
  <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
    <h3>Drop your RAW export here</h3>
    <p>Upload the <strong>NEW-Breaches-file</strong> .xlsx or a <strong>SLAs-Details .csv</strong> from ServiceNow</p>
    <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('file-input').click()">Choose file</button>
    <input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="handleFile(this.files[0])">
  </div>
  <div class="kpis" id="kpi-area" style="display:none"></div>
  <div id="results" style="display:none">
    <div class="tabs-bar" id="tabs-bar"></div>
    <div class="toolbar">
      <div class="toolbar-left" id="row-count"></div>
      <div class="btn-group">
        <button class="btn-outline" onclick="exportTab()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export Tab
        </button>
      </div>
    </div>
    <div class="table-wrap"><table class="data-table" id="data-table"></table></div>
  </div>
  <div id="empty-state" class="empty">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
    <h3>No data loaded yet</h3>
    <p>Upload a Breaches .xlsx or SLAs-Details .csv to auto-distribute into all 8 tabs</p>
  </div>
</main>
<script>
let tabs={},activeTab='';
const TAB_DEFS=[
  {id:'ksl4-wri',label:'KSL-4 WRI',code:'KSL-4',lang:'!de'},
  {id:'ksl4-de',label:'KSL-4 DE',code:'KSL-4',lang:'de'},
  {id:'km1-gr',label:'KM-1 GR',code:'KM-1',lang:'!de',nokFilter:true},
  {id:'km1-de',label:'KM-1 DE',code:'KM-1',lang:'de',nokFilter:true},
  {id:'ksl5a-gr',label:'KSL-5a GR',code:'KSL-5a',lang:'!de'},
  {id:'ksl5a-de',label:'KSL-5a DE',code:'KSL-5a',lang:'de'},
  {id:'km2-gr',label:'KM-2 GR',code:'KM-2',lang:'!de'},
  {id:'km2-de',label:'KM-2 DE',code:'KM-2',lang:'de'},
];
const C_XLSX={ticket:0,date_close:3,status:4,queue:5,priority:6,lang:12,tool:14,topic:15,sla_code:19,sla_n:24,breach_desc:25,breach_dt:26,nok:27};
const C_CSV={sla_code:0,priority:8,sla_n:10,breach_desc:11,breach_dt:12,nok:13,tool:15,date_close:18,status:19,lang:20,ticket:21,queue:22,topic:27};
let C=C_XLSX;
const OUT_COLS=['Incident Ticket','DATE_CLOSE','Status','Queue','Priority','ISO_Language','Tool','TOPIC','SLA_Code','SLA_N','Breach_Description','DATE_TIME_Breach','Agent','BMS ID','Comment if excluded','Additional comment','Excluded','Jira','Week','Unique'];
const MANUAL_C=['Agent','BMS ID','Comment if excluded','Additional comment','Excluded','Jira','Week','Unique'];
function handleFile(file){
  if(!file)return;
  showStatus('Reading file...');
  const ext=file.name.split('.').pop().toLowerCase();
  const reader=new FileReader();
  if(ext==='csv'){
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'string',raw:false,dateNF:'yyyy-mm-dd hh:mm:ss'});
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,raw:false,dateNF:'yyyy-mm-dd hh:mm:ss'});
        if(rows.length<2){showStatus('CSV appears empty.','error');return;}
        C=C_CSV;processRows(rows.slice(1));
      }catch(err){showStatus('Error: '+err.message,'error');}
    };
    reader.readAsText(file,'UTF-8');
  }else{
    reader.onload=e=>{
      try{
        const wb=XLSX.read(e.target.result,{type:'array',cellDates:true,dateNF:'yyyy-mm-dd hh:mm:ss'});
        const rawName=wb.SheetNames.find(n=>n.toLowerCase().includes('raw'));
        if(!rawName){showStatus('No RAW sheet found.','error');return;}
        const rows=XLSX.utils.sheet_to_json(wb.Sheets[rawName],{header:1,raw:false,dateNF:'yyyy-mm-dd hh:mm:ss'});
        if(rows.length<2){showStatus('RAW sheet empty.','error');return;}
        C=C_XLSX;processRows(rows.slice(1));
      }catch(err){showStatus('Error: '+err.message,'error');}
    };
    reader.readAsArrayBuffer(file);
  }
}
function processRows(rows){
  tabs={};TAB_DEFS.forEach(t=>tabs[t.id]=[]);
  const maxIdx=Math.max(...Object.values(C));
  const s=rows[0];
  if(!s||s.length<=maxIdx){showStatus('File structure mismatch.','error');return;}
  const slaSample=(s[C.sla_code]||'').toString().trim();
  if(!slaSample.startsWith('KS')&&!slaSample.startsWith('KM')&&!slaSample.startsWith('PC')){
    showStatus('Column mapping off — SLA Code contains: "'+slaSample+'". Try other format.','error');return;
  }
  rows.forEach(row=>{
    if(!row[C.ticket])return;
    const sla=(row[C.sla_code]||'').toString().trim();
    const lang=(row[C.lang]||'').toString().trim().toLowerCase();
    const nok=parseInt(row[C.nok])||0;
    const mapped={'Incident Ticket':row[C.ticket]||'','DATE_CLOSE':row[C.date_close]||'','Status':row[C.status]||'','Queue':row[C.queue]||'','Priority':row[C.priority]||'','ISO_Language':row[C.lang]||'','Tool':row[C.tool]||'','TOPIC':row[C.topic]||'','SLA_Code':sla,'SLA_N':row[C.sla_n]||'','Breach_Description':row[C.breach_desc]||'','DATE_TIME_Breach':row[C.breach_dt]||'','Agent':'','BMS ID':'','Comment if excluded':'','Additional comment':'','Excluded':'','Jira':'','Week':'','Unique':''};
    TAB_DEFS.forEach(t=>{
      if(t.code!==sla)return;
      const isDE=lang==='de';
      if(t.lang==='de'&&!isDE)return;
      if(t.lang==='!de'&&isDE)return;
      if(t.nokFilter&&nok!==1)return;
      tabs[t.id].push(mapped);
    });
  });
  renderKPIs();renderTabs();
  document.getElementById('empty-state').style.display='none';
  document.getElementById('kpi-area').style.display='';
  document.getElementById('results').style.display='';
  document.getElementById('export-all-btn').style.display='';
  showStatus('Loaded — '+Object.values(tabs).reduce((a,b)=>a+b.length,0)+' records across 8 tabs');
  setTimeout(()=>document.getElementById('status').style.display='none',3500);
  if(!activeTab||!tabs[activeTab])activeTab=TAB_DEFS[0].id;
  renderTable(activeTab);
}
function renderKPIs(){
  const total=Object.values(tabs).reduce((a,b)=>a+b.length,0);
  let html='<div class="kpi"><div class="kpi-label">Total</div><div class="kpi-value">'+total+'</div><div class="kpi-sub">all categories</div></div>';
  TAB_DEFS.forEach(t=>{html+='<div class="kpi"><div class="kpi-label">'+t.label+'</div><div class="kpi-value">'+tabs[t.id].length+'</div><div class="kpi-sub">breaches</div></div>';});
  document.getElementById('kpi-area').innerHTML=html;
}
function renderTabs(){
  document.getElementById('tabs-bar').innerHTML=TAB_DEFS.map(t=>'<button class="tab-btn'+(t.id===activeTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'<span class="tab-badge">'+tabs[t.id].length+'</span></button>').join('');
}
function switchTab(id){activeTab=id;renderTabs();renderTable(id);}
function renderTable(tabId){
  const data=tabs[tabId]||[];
  document.getElementById('row-count').textContent=data.length+' records';
  const tbl=document.getElementById('data-table');
  if(!data.length){tbl.innerHTML='<tr><td colspan="20" style="text-align:center;padding:3rem;color:var(--muted)">No breaches in this category</td></tr>';return;}
  let html='<thead><tr>'+OUT_COLS.map(c=>'<th class="'+(MANUAL_C.includes(c)?'manual-col':'')+'">'+c+'</th>').join('')+'</tr></thead><tbody>';
  data.forEach(row=>{html+='<tr>'+OUT_COLS.map(c=>'<td class="'+(MANUAL_C.includes(c)?'manual-col':'')+'" title="'+String(row[c]).replace(/"/g,'&quot;')+'">'+( row[c]||'')+'</td>').join('')+'</tr>';});
  tbl.innerHTML=html+'</tbody>';
}
function exportTab(){
  const data=tabs[activeTab];
  if(!data||!data.length){alert('No data.');return;}
  const ws=XLSX.utils.json_to_sheet(data,{header:OUT_COLS});
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,activeTab);
  XLSX.writeFile(wb,'Breaches_'+activeTab+'_'+today()+'.xlsx');
}
function exportAll(){
  const wb=XLSX.utils.book_new();
  TAB_DEFS.forEach(t=>{
    const data=tabs[t.id];
    const ws=XLSX.utils.json_to_sheet(data.length?data:[Object.fromEntries(OUT_COLS.map(c=>[c,""]))],{header:OUT_COLS});
    XLSX.utils.book_append_sheet(wb,ws,t.label);
  });
  XLSX.writeFile(wb,'Breaches_All_'+today()+'.xlsx');
}
function today(){return new Date().toISOString().slice(0,10).replace(/-/g,'');}
const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handleFile(f);});
function showStatus(msg,type='ok'){const el=document.getElementById('status');el.textContent=msg;el.className='status-bar'+(type==='error'?' error':'');el.style.display='';}
(function(){const btn=document.querySelector('[data-theme-toggle]');const root=document.documentElement;let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';root.setAttribute('data-theme',d);if(btn)btn.addEventListener('click',()=>{d=d==='dark'?'light':'dark';root.setAttribute('data-theme',d);});})();
</script>
</body>
</html>
