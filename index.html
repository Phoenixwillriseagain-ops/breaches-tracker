<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breaches Tracker</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link href="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" rel="preload" as="script">

  <link href="styles.css" rel="stylesheet">
</head>
<body>
<div class="app">
  <nav class="app-nav">
    <a href="index.html" class="active">Breaches Tracker</a>
    <a href="reporter.html">Reporter</a>
  </nav>

  <div class="toolbar">
    <div class="toolbar-left">
      <label class="file-label" for="file-input">Import File</label>
      <input type="file" id="file-input" accept=".csv,.xlsx,.xls" style="display:none">
    </div>
    <div class="btn-group">
      <button class="btn-outline" onclick="window.BT.exportTab(window.BT.trackerState.activeTab)" title="Export current tab (Ctrl+E)">Export Tab</button>
      <button id="export-all-btn" class="btn-outline" onclick="window.BT.exportAll()" title="Export all tabs (Ctrl+Shift+E)" style="display:none">Export All</button>
      <a href="reporter.html" class="btn-outline" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;" title="Open Breaches Reporter">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open Reporter
      </a>
    </div>
  </div>

  <div id="status" class="status-bar" style="display:none"></div>

  <div class="tabs-wrapper">
    <div class="tabs" id="tabs-container"></div>
  </div>

  <div class="table-area" id="table-area">
    <div class="empty-state" id="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--color-text-faint);margin-bottom:12px"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10,9 9,9 8,9"/></svg>
      <p>Import a CSV or XLSX file to begin</p>
      <span style="font-size:12px;color:var(--color-text-faint)">Drop file anywhere or click <strong>Import File</strong></span>
    </div>
    <div id="data-table-wrap" style="display:none">
      <div class="table-toolbar">
        <input type="text" id="search-input" placeholder="Search…" style="width:220px">
        <span id="row-count" class="muted-label"></span>
      </div>
      <div class="table-scroll">
        <table id="data-table">
          <thead id="data-thead"></thead>
          <tbody id="data-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="data-processor.js"></script>
<script src="ui-renderer.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    window.BT.init();
    window.BT.setupDropZone && window.BT.setupDropZone();

    const fileInput = document.getElementById('file-input');
    if (fileInput) {
      fileInput.addEventListener('change', function(e) {
        const f = e.target.files[0];
        if (f) window.BT.handleFile(f);
        fileInput.value = '';
      });
    }

    document.addEventListener('dragover', function(e) { e.preventDefault(); });
    document.addEventListener('drop', function(e) {
      e.preventDefault();
      const f = e.dataTransfer.files[0];
      if (f) window.BT.handleFile(f);
    });

    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
        e.preventDefault();
        if (e.shiftKey) window.BT.exportAll();
        else window.BT.exportTab(window.BT.trackerState.activeTab);
      }
    });
  });
</script>
</body>
</html>
