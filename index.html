<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breaches Tracker</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link href="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" rel="preload" as="script">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link href="styles.css" rel="stylesheet">
</head>
<body>
  <nav class="app-nav">
    <a href="index.html" class="active">Breaches Tracker</a>
    <a href="reporter.html">Reporter</a>
  </nav>

  <header class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      Breaches Tracker
    </div>
    <div class="header-right">
      <button class="theme-btn" data-theme-toggle aria-label="Toggle theme">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
        </svg>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="kpis" id="kpi-area"></div>

    <div class="tabs-bar" id="tabs-bar"></div>

    <div class="toolbar">
      <div class="toolbar-left">
        <span id="row-count"></span>
      </div>
      <div class="btn-group">
        <button class="btn-outline" onclick="window.BT.exportTab(window.BT.trackerState.activeTab)" title="Export current tab (Ctrl+E)">Export Tab</button>
        <button id="export-all-btn" class="btn-outline" onclick="window.BT.exportAll()" title="Export all tabs (Ctrl+Shift+E)" style="display:none">Export All</button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="data-table" id="data-table"></table>
    </div>

    <div id="empty-state">
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14,2 14,8 20,8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
        <h3>No data loaded yet</h3>
        <p>Upload a Breaches .xlsx or SLAs-Details .csv from ServiceNow to auto-distribute into all 8 tabs</p>
      </div>
    </div>

    <div id="drop-zone" class="upload-zone">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17,8 12,3 7,8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      <h3>Drop your RAW export here</h3>
      <p>Upload the <strong>NEW-Breaches-file</strong> .xlsx or a <strong>SLAs-Details .csv</strong> from ServiceNow</p>
      <button class="upload-btn">Choose file</button>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="window.BT.handleFile(this.files[0])">
    </div>
  </main>

  <div id="status" class="status-bar" style="display:none"></div>

  <!-- Modular scripts -->
  <script src="config.js"></script>
  <script src="data-processor.js"></script>
  <script src="ui-renderer.js"></script>
  <script>
    // Initialization
    document.addEventListener('DOMContentLoaded', function() {
      window.BT.init();
      window.BT.setupDropZone();
      window.BT.initTheme();
      window.BT.initKeyboardShortcuts();
      window.BT.renderEmptyState(true);
    });
  </script>
</body>
</html>
