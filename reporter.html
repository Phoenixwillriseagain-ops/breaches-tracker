<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breaches Reporter</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <style>
    html, body { height: 100%; }
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    .reporter-layout { display: flex; flex: 1; overflow: hidden; }
    .reporter-sidebar {
      width: 220px; min-width: 220px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    .reporter-sidebar h3 {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 4px;
    }
    .filter-block { display: flex; flex-direction: column; gap: 5px; }
    .filter-block label { font-size: 11px; color: var(--muted); }
    .filter-block select {
      width: 100%; padding: 5px 8px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg);
      font-size: 12px; color: var(--text); font-family: inherit;
    }
    .reporter-main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

    .toolbar { background: var(--surface); border-bottom: 1px solid var(--divider); padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar-left { display: flex; gap: 8px; }

    #upload-section { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; min-height: 340px; }
    .drop-zone {
      width: 100%; max-width: 480px; border: 2px dashed var(--border);
      border-radius: 12px; padding: 48px 32px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-hi); }
    .drop-zone svg { color: var(--faint); margin: 0 auto 12px; display: block; }
    .drop-zone p { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .drop-zone span { font-size: 12px; color: var(--muted); }
    #upload-status { font-size: 13px; }
    #upload-status.ok  { color: var(--success); }
    #upload-status.err { color: var(--error); }

    #data-section { display: none; flex-direction: column; gap: 20px; }
    #data-section.visible { display: flex; }

    #rpt-import-log {
      display: none;
      margin: 0 0 4px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      line-height: 1.8;
      color: var(--text);
    }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .kpi-card .kpi-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
    .kpi-card .kpi-val { font-size: 26px; font-weight: 700; line-height: 1; }
    .kpi-card .kpi-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .kpi-card.c-total .kpi-val  { color: var(--text); }
    .kpi-card.c-ksl4  .kpi-val  { color: #006494; }
    .kpi-card.c-km1   .kpi-val  { color: #006494; }
    .kpi-card.c-ksl5a .kpi-val  { color: #964219; }
    .kpi-card.c-km2   .kpi-val  { color: #7a39bb; }
    .kpi-card.c-aos   .kpi-val  { color: var(--primary); }
    .kpi-card.c-excl  .kpi-val  { color: var(--muted); }

    .sc { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .sc-head { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .sc-head h2 { font-size: 13px; font-weight: 600; }
    .sc-head .badge { margin-left: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--muted); }
    .sc-body { padding: 14px 16px; overflow-x: auto; }

    .bar-chart { display: flex; flex-direction: column; gap: 7px; }
    .bar-row   { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .bar-lbl   { width: 160px; min-width: 90px; text-align: right; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
    .bar-track { flex: 1; height: 12px; background: var(--divider); border-radius: 4px; overflow: hidden; min-width: 60px; }
    .bar-fill  { height: 100%; border-radius: 4px; transition: width .4s; }
    .bar-cnt   { width: 32px; font-weight: 600; font-size: 11px; text-align: right; flex-shrink: 0; }

    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }

    .rpt-tabs { display: flex; border-bottom: 2px solid var(--border); flex-wrap: wrap; gap: 0; }
    .rpt-tab {
      padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; background: none; font-family: inherit; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .rpt-tab:hover  { color: var(--text); }
    .rpt-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .dt { width: 100%; border-collapse: collapse; font-size: 12px; }
    .dt th { background: var(--bg); padding: 6px 10px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .dt td { padding: 6px 10px; border-bottom: 1px solid var(--divider); vertical-align: top; }
    .dt tr:last-child td { border-bottom: none; }
    .dt tr:hover td { background: var(--surface-2); }
    .dt tr.excl td { opacity: .45; }

    .chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .ch-ksl4  { background: #dce9f3; color: #006494; }
    .ch-km1   { background: #dce9f3; color: #006494; }
    .ch-ksl5a { background: #f2e3d7; color: #964219; }
    .ch-km2   { background: #ede3f8; color: #7a39bb; }
    .ch-other { background: #f0eeea; color: var(--muted); }
    .ch-y     { background: #d6ecec; color: var(--primary); }
    .ch-jira  { background: #e8edf8; color: #0052cc; font-family: monospace; }

    .pg { display: flex; align-items: center; gap: 5px; margin-top: 10px; justify-content: flex-end; font-size: 12px; color: var(--muted); flex-wrap: wrap; }
    .pg-btn { padding: 3px 9px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); cursor: pointer; font-size: 12px; font-family: inherit; }
    .pg-btn:hover   { background: var(--bg); }
    .pg-btn.on      { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pg-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ---- Language multi-select dropdown ---- */
    .lang-filter-wrap { position: relative; }
    .lang-trigger {
      width: 100%; padding: 5px 8px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg);
      font-size: 12px; color: var(--text); font-family: inherit;
      text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      transition: border-color .15s;
    }
    .lang-trigger:hover, .lang-trigger.open { border-color: var(--primary); }
    .lang-trigger .lt-arrow { font-size: 9px; color: var(--muted); margin-left: 4px; flex-shrink: 0; }
    .lang-dropdown {
      display: none; position: fixed; z-index: 999;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,.12);
      min-width: 180px; max-width: 240px;
      overflow: hidden;
    }
    .lang-dropdown.open { display: block; }
    .lang-dd-header {
      padding: 7px 10px; border-bottom: 1px solid var(--divider);
      display: flex; gap: 6px;
    }
    .lang-dd-header button {
      font-size: 11px; font-family: inherit; cursor: pointer;
      padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      transition: background .12s;
    }
    .lang-dd-header button:hover { background: var(--primary-hi, #cedcd8); }
    .lang-dd-list {
      max-height: 200px; overflow-y: auto;
      padding: 4px 0;
    }
    .lang-dd-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      transition: background .1s;
    }
    .lang-dd-item:hover { background: var(--surface-2, #f3f0ec); }
    .lang-dd-item input[type=checkbox] { margin: 0; cursor: pointer; accent-color: var(--primary); }

    /* ---- Heatmap shared styles ---- */
    .heatmap-wrap { overflow-x: auto; }
    .heatmap-table {
      border-collapse: separate;
      border-spacing: 3px;
      font-size: 11px;
      white-space: nowrap;
    }
    .heatmap-table th {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .04em; color: var(--muted); padding: 3px 5px;
      text-align: center; background: none; border: none;
    }
    .heatmap-table td {
      width: 36px; height: 28px; text-align: center;
      border-radius: 4px; font-size: 10px; font-weight: 600;
      cursor: default; transition: transform .1s;
      border: none;
    }
    .heatmap-table td:hover { transform: scale(1.15); z-index: 2; position: relative; }
    .heatmap-table td.hm-day-lbl {
      width: auto; text-align: right; padding-right: 8px;
      color: var(--muted); font-weight: 600; font-size: 10px;
      background: none; cursor: default;
    }
    .heatmap-table td.hm-day-lbl:hover { transform: none; }

    .hm-legend {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--muted); margin-top: 10px;
    }
    .hm-legend-swatch { display: flex; gap: 2px; }
    .hm-legend-swatch span { display: inline-block; width: 18px; height: 12px; border-radius: 2px; }

    /* ---- Per-KPI heatmap grid ---- */
    .kpi-heatmap-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-top: 20px;
    }
    @media (max-width: 1100px) { .kpi-heatmap-grid { grid-template-columns: 1fr; } }

    .kpi-hm-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .kpi-hm-head {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .kpi-hm-head h3 { font-size: 13px; font-weight: 700; }
    .kpi-hm-head .badge {
      margin-left: auto;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 8px; font-size: 10px; color: var(--muted);
    }
    .kpi-hm-body { padding: 12px 14px; overflow-x: auto; }

    /* mini hourly bar */
    .hourly-bar-wrap { display: flex; gap: 2px; align-items: flex-end; height: 36px; margin-top: 10px; }
    .hourly-bar-col { flex: 1; border-radius: 2px 2px 0 0; min-width: 3px; transition: opacity .15s; }
    .hourly-bar-col:hover { opacity: .75; }

    /* insight strip */
    .hm-insight {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-top: 10px; padding-top: 8px;
      border-top: 1px solid var(--divider);
      font-size: 10px; color: var(--muted);
    }
    .hm-insight span { display: flex; align-items: center; gap: 4px; }
    .hm-insight b { color: var(--text); font-size: 11px; }

    /* ---- Trends heatmap ---- */
    .trends-grid { display: flex; flex-direction: column; gap: 20px; }
    .trend-section { display: flex; flex-direction: column; gap: 6px; }
    .trend-section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted);
    }
    .trend-table-wrap { overflow-x: auto; }
    .trend-table {
      border-collapse: separate;
      border-spacing: 3px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .trend-table th {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: var(--muted);
      padding: 4px 8px; background: none; border: none;
      text-align: center;
    }
    .trend-table th.tt-row-lbl { text-align: left; min-width: 72px; }
    .trend-table td {
      height: 32px; min-width: 52px;
      text-align: center; border-radius: 5px;
      font-size: 11px; font-weight: 700;
      cursor: default; transition: transform .1s;
      border: none; padding: 0 4px;
    }
    .trend-table td:hover { transform: scale(1.08); z-index: 2; position: relative; }
    .trend-table td.tt-row-lbl {
      text-align: left; font-weight: 600; font-size: 11px;
      color: var(--muted); background: none !important; padding: 0 8px 0 0;
      min-width: 72px;
    }
    .trend-table td.tt-row-lbl:hover { transform: none; }
    .trend-table tr.delta-row td {
      height: 24px; font-size: 10px; font-weight: 700; border-radius: 4px;
    }
    .trend-table tr.delta-row td.tt-row-lbl { font-size: 10px; color: var(--faint); }
    .trend-table tr.spacer-row td { height: 8px; background: none !important; }
    .trend-table tr.section-hdr-row td {
      background: none !important; padding-top: 12px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted);
    }
    .trend-table tr.section-hdr-row td:hover { transform: none; }
    .trends-legend {
      display: flex; gap: 16px; flex-wrap: wrap;
      font-size: 10px; color: var(--muted); margin-top: 4px; align-items: center;
    }
    .trends-legend-item { display: flex; align-items: center; gap: 5px; }
    .trends-legend-swatch { display: flex; gap: 2px; }
    .trends-legend-swatch span { display:inline-block; width:14px; height:10px; border-radius:2px; }

    /* ---- Jira Tracker ---- */
    .jira-link {
      color: #0052cc; text-decoration: none; font-family: monospace;
      font-size: 11px; font-weight: 600;
    }
    .jira-link:hover { text-decoration: underline; }

    /* ---- KSL-4 Pivot table ---- */
    .ksl4-pivot-wrap { overflow-x: auto; }
    .ksl4-pivot {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .ksl4-pivot th {
      background: var(--bg); padding: 6px 10px;
      text-align: left; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em;
      color: var(--muted); border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }
    .ksl4-pivot th.col-comment   { min-width: 220px; }
    .ksl4-pivot th.col-aos-issue { min-width: 200px; }
    .ksl4-pivot td {
      padding: 7px 10px; border-bottom: 1px solid var(--divider);
      vertical-align: top; font-size: 12px;
    }
    .ksl4-pivot tr:last-child td { border-bottom: none; }
    .ksl4-pivot tr:hover td { background: var(--surface-2); }
    .ksl4-pivot tr.excl td { opacity: .45; }
    .ksl4-pivot td.cell-comment {
      color: var(--text); font-size: 11px; line-height: 1.5;
      max-width: 320px;
    }
    .ksl4-pivot td.cell-aos-issue {
      color: #006494; font-size: 11px; line-height: 1.5;
      max-width: 280px;
    }
    .ksl4-pivot td.cell-empty {
      color: var(--faint); font-style: italic; font-size: 11px;
    }
    .ksl4-pivot .aos-badge {
      display: inline-block; padding: 1px 7px; border-radius: 20px;
      font-size: 10px; font-weight: 700;
      background: #d6ecec; color: var(--primary);
    }

    /* ---- Pivot table (reporter-pivot.js) ---- */
    .pvt-wrap {}
    .pvt-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .pvt-ctrl-lbl { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .pvt-sel { padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); font-size: 12px; color: var(--text); font-family: inherit; cursor: pointer; }
    .pvt-sel:focus { outline: 2px solid var(--primary); outline-offset: 2px; }
    .pvt-ctrl-sep { font-size: 16px; color: var(--faint); font-weight: 300; }
    .pvt-export-btn { margin-left: auto; padding: 5px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); font-size: 12px; color: var(--text); font-family: inherit; cursor: pointer; transition: background .15s, border-color .15s; }
    .pvt-export-btn:hover { background: var(--surface-2); border-color: var(--primary); color: var(--primary); }
    .pvt-table-scroll { overflow-x: auto; }
    .pvt-table { border-collapse: collapse; font-size: 12px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .pvt-th { background: var(--bg); padding: 6px 10px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border-bottom: 2px solid var(--border); border-right: 1px solid var(--divider); white-space: nowrap; }
    .pvt-th-corner { text-align: left; min-width: 90px; }
    .pvt-th-col    { text-align: center; min-width: 56px; }
    .pvt-th-total  { text-align: center; min-width: 56px; border-left: 2px solid var(--border); color: var(--text); }
    .pvt-row-lbl { padding: 5px 10px; border-bottom: 1px solid var(--divider); border-right: 1px solid var(--divider); font-size: 12px; font-weight: 600; color: var(--muted); background: var(--bg); white-space: nowrap; }
    .pvt-cell { padding: 5px 8px; border-bottom: 1px solid var(--divider); border-right: 1px solid var(--divider); text-align: center; font-weight: 700; font-size: 12px; cursor: default; transition: transform .1s; }
    .pvt-cell:hover { transform: scale(1.15); z-index: 2; position: relative; }
    .pvt-total-cell { padding: 5px 10px; border-bottom: 1px solid var(--divider); text-align: center; font-weight: 700; font-size: 12px; background: var(--bg); }
    .pvt-row-total  { border-left: 2px solid var(--border); color: var(--text); }
    .pvt-col-total  { border-right: 1px solid var(--divider); color: var(--text); }
    .pvt-grand-total { border-left: 2px solid var(--border); color: var(--primary); font-size: 13px; }
    .pvt-grand-row .pvt-grand-lbl { padding: 6px 10px; border-top: 2px solid var(--border); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--text); background: var(--bg); border-right: 1px solid var(--divider); }
    .pvt-grand-row .pvt-total-cell { border-top: 2px solid var(--border); }
    .pvt-msg  { font-size: 12px; color: var(--muted); padding: 20px 0; }
    .pvt-warn { color: var(--warning, #964219); }
    .pvt-note { font-size: 10px; color: var(--faint); margin-top: 10px; }

    /* ---- Per-SLA drill-down panels ---- */
    .sla-pvt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    @media (max-width: 1200px) { .sla-pvt-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 800px)  { .sla-pvt-grid { grid-template-columns: 1fr; } }
    .mini-pvt-wrap { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .mini-pvt-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 7px 10px; border-bottom: 1px solid var(--divider); background: var(--surface); }
    .sla-pvt-panel .sc-head h2 { font-size: 13px; font-weight: 700; }

    @media (max-width: 720px) {
      .reporter-layout { flex-direction: column; }
      .reporter-sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- NAV -->
  <nav class="app-nav">
    <a href="index.html">Breaches Tracker</a>
    <a href="reporter.html" class="active">Reporter</a>
  </nav>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button id="import-btn" class="btn-outline">&#8679; Import Breaches File(s)</button>
      <input type="file" id="rpt-file-input" accept=".xlsx" multiple style="display:none">
      <button id="rpt-clear-btn" class="btn-outline"
              style="display:none;color:var(--error,#a12c7b);border-color:var(--error,#a12c7b);"
              title="Clear all loaded data and start fresh">Clear All</button>
    </div>
    <div id="export-btns" style="display:none" class="btn-group">
      <button class="btn-outline" onclick="window.RPT.exportFiltered()">Export Filtered</button>
      <button class="btn-outline" onclick="window.RPT.exportReport()">Export All</button>
    </div>
    <span id="record-count" style="font-size:12px;color:var(--muted);margin-left:auto"></span>
  </div>

  <div class="reporter-layout">

    <!-- SIDEBAR -->
    <aside class="reporter-sidebar" id="rpt-sidebar" style="display:none">
      <div>
        <h3>Filters</h3>
        <div class="filter-block">
          <label>Week</label>    <select id="filter-week"><option value="All">All</option></select>
          <label>SLA</label>     <select id="filter-sla"><option value="All">All</option></select>

          <label>Language</label>
          <div class="lang-filter-wrap" id="lang-filter-wrap">
            <button type="button" class="lang-trigger" id="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
              <span id="lang-trigger-label">All</span>
              <span class="lt-arrow">&#9660;</span>
            </button>

<script>
var _currentTab     = 'dashboard';
var _currentPage    = 1;
var _currentTabRows = [];
var PAGE_SIZE       = 50;

window.renderTables = function() {
  var data = window.RPT ? window.RPT.filtered : [];
  _buildKPIs(data);
  _renderTab(_currentTab);
  document.getElementById('rpt-sidebar').style.display = '';
  document.getElementById('export-btns').style.display = '';
  var cb = document.getElementById('rpt-clear-btn');
  if (cb) cb.style.display = '';
  var rc = document.getElementById('record-count');
  if (rc) rc.textContent = window.RPT.countUniqueTickets(data) + ' unique ticket(s)';
};
window.renderCharts = function() {};

function _tabRows(name, data) {
  if (name === 'all')   return data;
  if (name === 'ksl4')  return data.filter(function(r){return r.sla==='KSL-4';});
  if (name === 'km1')   return data.filter(function(r){return r.sla==='KM-1';});
  if (name === 'ksl5a') return data.filter(function(r){return r.sla==='KSL-5a';});
  if (name === 'km2')   return data.filter(function(r){return r.sla==='KM-2';});
  if (name === 'aos')   return data.filter(function(r){return r.isAos;});
  return null;
}

function _renderTab(name) {
  _currentTab  = name;
  _currentPage = 1;
  var data = window.RPT ? window.RPT.filtered : [];
  var el   = document.getElementById('tab-content');
  if (!el) return;

  if (name === 'pivot') {
    _currentTabRows = [];
    el.innerHTML = '<div id="pivot-container"></div>';
    if (typeof window.renderPivot === 'function') window.renderPivot();
    return;
  }

  if (name === 'ksl4') {
    var ksl4rows = data.filter(function(r){return r.sla==='KSL-4';});
    _currentTabRows = ksl4rows;
    el.innerHTML =
      _buildKsl4Pivot(ksl4rows) +
      _buildTable('KSL-4 — All Records', ksl4rows, 'ksl4');
    return;
  }

  var rows = _tabRows(name, data);
  if (rows !== null) {
    _currentTabRows = rows;
    var labels = {
      all: 'All Records', km1: 'KM-1',
      ksl5a: 'KSL-5a', km2: 'KM-2', aos: 'AOS Records'
    };
    el.innerHTML = _buildTable(labels[name] || name, rows, name);
  } else {
    _currentTabRows = [];
    if      (name === 'dashboard') el.innerHTML = _buildDashboard(data);
    else if (name === 'trends')    el.innerHTML = _buildTrends(data);
    else if (name === 'heatmap')   el.innerHTML = _buildHeatmap(data);
    else if (name === 'overview')  el.innerHTML = _buildOverview(data);
    else if (name === 'jira')      el.innerHTML = _buildJiraTracker(data);
  }
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('tab-bar').addEventListener('click', function(e) {
    var btn = e.target.closest('.rpt-tab');
    if (!btn) return;
    document.querySelectorAll('.rpt-tab').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    _renderTab(btn.dataset.tab);
  });

  var trigger  = document.getElementById('lang-trigger');
  var dropdown = document.getElementById('lang-dropdown');

  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    dropdown.classList.contains('open') ? _closeLangDropdown() : _openLangDropdown();
  });

  document.addEventListener('click', function(e) {
    if (!document.getElementById('lang-filter-wrap').contains(e.target)) {
      _closeLangDropdown();
    }
  });

  document.getElementById('lang-select-all').addEventListener('click', function(e) {
    e.stopPropagation();
    document.querySelectorAll('#lang-dd-list input[type=checkbox]').forEach(function(cb) { cb.checked = true; });
    _onLangChange();
  });

  document.getElementById('lang-deselect-all').addEventListener('click', function(e) {
    e.stopPropagation();
    document.querySelectorAll('#lang-dd-list input[type=checkbox]').forEach(function(cb) { cb.checked = false; });
    _onLangChange();
  });
});

function _openLangDropdown() {
  var trigger  = document.getElementById('lang-trigger');
  var dropdown = document.getElementById('lang-dropdown');
  var wrap     = document.getElementById('lang-filter-wrap');
  var rect     = wrap.getBoundingClientRect();
  dropdown.style.top    = (rect.bottom + 4) + 'px';
  dropdown.style.left   = rect.left + 'px';
  dropdown.style.width  = Math.max(rect.width, 180) + 'px';
  dropdown.classList.add('open');
  trigger.classList.add('open');
  trigger.setAttribute('aria-expanded', 'true');
}

function _closeLangDropdown() {
  var trigger  = document.getElementById('lang-trigger');
  var dropdown = document.getElementById('lang-dropdown');
  dropdown.classList.remove('open');
  trigger.classList.remove('open');
  trigger.setAttribute('aria-expanded', 'false');
}

window._onLangChange = function _onLangChange() {
  if (window.RPT) window.RPT.applyFilters();
  _updateLangLabel();
};

function _updateLangLabel() {
  var all     = document.querySelectorAll('#lang-dd-list input[type=checkbox]');
  var checked = document.querySelectorAll('#lang-dd-list input[type=checkbox]:checked');
  var lbl     = document.getElementById('lang-trigger-label');
  if (!lbl) return;
  if (checked.length === 0)               lbl.textContent = 'None';
  else if (checked.length === all.length) lbl.textContent = 'All';
  else if (checked.length <= 2)           lbl.textContent = Array.from(checked).map(function(c){ return c.value; }).join(', ');
  else                                     lbl.textContent = checked.length + ' selected';
}

window.getSelectedLanguages = function() {
  var checked = document.querySelectorAll('#lang-dd-list input[type=checkbox]:checked');
  return new Set(Array.from(checked).map(function(c){ return c.value; }));
};
</script>

<script>
/* ---- KPIs ---- */
function _buildKPIs(data) {
  var uniqueTotal = window.RPT.countUniqueTickets(data);
  var activeData  = data.filter(function(r){return r.excluded==='N';});
  var uniqueActive= window.RPT.countUniqueTickets(activeData);
  var excl        = uniqueTotal - uniqueActive;

  function bySla(s){
    return window.RPT.countUniqueTickets(activeData.filter(function(r){return r.sla===s;}));
  }
  var aos = window.RPT.countUniqueTickets(activeData.filter(function(r){return r.isAos;}));
  var wk  = {}; data.forEach(function(r){if(r.week)wk[r.week]=1;});

  document.getElementById('kpi-row').innerHTML =
    _kpi('c-total','Unique Tickets', uniqueTotal, Object.keys(wk).length+' week(s)')+
    _kpi('c-ksl4', 'KSL-4',  bySla('KSL-4'),  _pct(bySla('KSL-4'),  uniqueActive))+
    _kpi('c-km1',  'KM-1',   bySla('KM-1'),   _pct(bySla('KM-1'),   uniqueActive))+
    _kpi('c-ksl5a','KSL-5a', bySla('KSL-5a'), _pct(bySla('KSL-5a'), uniqueActive))+
    _kpi('c-km2',  'KM-2',   bySla('KM-2'),   _pct(bySla('KM-2'),   uniqueActive))+
    _kpi('c-aos',  'AOS',    aos, _pct(aos, uniqueActive))+
    _kpi('c-excl', 'Excluded', excl, _pct(excl, uniqueTotal));
}
function _kpi(cls,lbl,val,sub){
  return '<div class="kpi-card '+cls+'">'+
    '<div class="kpi-lbl">'+lbl+'</div>'+
    '<div class="kpi-val">'+val+'</div>'+
    '<div class="kpi-sub">'+sub+'</div></div>';
}
function _pct(n,d){return d?Math.round(n/d*100)+'%':'0%';}

/* ---- KSL-4 pivot overview ---- */
function _buildKsl4Pivot(rows) {
  if (!rows || !rows.length) {
    return '<div class="sc" style="margin-bottom:0">'+
      '<div class="sc-head"><h2>KSL-4 — Comment &amp; AOS Issue Overview</h2></div>'+
      '<div class="sc-body"><p style="color:var(--muted);font-size:12px;padding:20px 0">No KSL-4 records in the current filter.</p></div>'+
      '</div>';
  }
  var seen = {}, deduped = [];
  rows.forEach(function(r){ if (!seen[r.ticket]) { seen[r.ticket]=true; deduped.push(r); } });
  deduped.sort(function(a,b){ if(a.isAos!==b.isAos) return a.isAos?-1:1; return a.ticket<b.ticket?-1:a.ticket>b.ticket?1:0; });
  var aosCount=deduped.filter(function(r){return r.isAos;}).length;
  var exclCount=deduped.filter(function(r){return r.excluded==='Y';}).length;
  var withComment=deduped.filter(function(r){return r.comment&&r.comment.trim();}).length;
  var withAosIssue=deduped.filter(function(r){return r.aosIssue&&r.aosIssue.trim();}).length;
  var badge=deduped.length+' unique ticket'+(deduped.length!==1?'s':'');
  if(aosCount)  badge+=' &bull; '+aosCount+' AOS';
  if(exclCount) badge+=' &bull; '+exclCount+' excl';
  var trs=deduped.map(function(r){
    var hasComment=r.comment&&r.comment.trim();
    var hasAosIssue=r.aosIssue&&r.aosIssue.trim();
    return '<tr class="'+(r.excluded==='Y'?'excl':'')+'">'+
      '<td style="font-family:monospace;font-size:11px;white-space:nowrap">'+_esc(r.ticket)+'</td>'+
      '<td style="white-space:nowrap;font-size:11px">'+_esc(r.week)+'</td>'+
      '<td>'+_esc(r.language)+'</td>'+
      '<td>'+_esc(r.tool)+'</td>'+
      '<td>'+_esc(r.reason)+'</td>'+
      '<td style="text-align:center">'+(r.isAos?'<span class="aos-badge">AOS</span>':'')+'</td>'+
      '<td style="text-align:center">'+(r.excluded==='Y'?'<span class="chip ch-other">Excl</span>':'')+'</td>'+
      (hasComment?'<td class="cell-comment">'+_esc(r.comment)+'</td>':'<td class="cell-empty">&mdash;</td>')+
      (hasAosIssue?'<td class="cell-aos-issue">'+_esc(r.aosIssue)+'</td>':'<td class="cell-empty">&mdash;</td>')+
    '</tr>';
  }).join('');
  var summaryNote=[];
  if(withComment)  summaryNote.push(withComment+' ticket(s) have a comment');
  if(withAosIssue) summaryNote.push(withAosIssue+' ticket(s) have an AOS Issue noted');
  var noteHtml=summaryNote.length?'<p style="font-size:10px;color:var(--muted);margin-top:10px">&#9432;&nbsp;'+summaryNote.join(' &bull; ')+'. Excluded rows shown at reduced opacity. Sorted: AOS first, then by ticket ID.</p>':'';
  return '<div class="sc" style="margin-bottom:0">'+
    '<div class="sc-head"><h2>KSL-4 &mdash; Comment &amp; AOS Issue Overview</h2><span class="badge">'+badge+'</span></div>'+
    '<div class="sc-body"><div class="ksl4-pivot-wrap">'+
    '<table class="ksl4-pivot"><thead><tr>'+
    '<th>Ticket</th><th>Week</th><th>Language</th><th>Tool</th><th>Reason</th>'+
    '<th style="text-align:center">AOS</th><th style="text-align:center">Excl</th>'+
    '<th class="col-comment">Comment</th><th class="col-aos-issue">AOS Issue</th>'+
    '</tr></thead><tbody>'+(trs||'<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--muted)">No records</td></tr>')+'</tbody></table>'+
    '</div>'+noteHtml+'</div></div>';
}

/* ---- Dashboard ---- */
function _buildDashboard(data) {
  var a = data.filter(function(r){ return r.excluded==='N'; });

  /* ---- standard aggregations ---- */
  var R={}, L={}, S={}, Q={}, P={}, ACT={};
  a.forEach(function(r){
    if(r.reason)   R[r.reason]  =(R[r.reason]||0)+1;
    if(r.language) L[r.language]=(L[r.language]||0)+1;
    if(r.sla)      S[r.sla]     =(S[r.sla]||0)+1;
    if(r.queue)    Q[r.queue]   =(Q[r.queue]||0)+1;
    if(r.topic)    P[r.topic]   =(P[r.topic]||0)+1;
    if(r.sla==='KM-1'&&r.action) ACT[r.action]=(ACT[r.action]||0)+1;
  });

  /* ---- KSL-4 Comment aggregation (unique tickets, active only) ---- */
  var ksl4Active = a.filter(function(r){ return r.sla==='KSL-4'; });
  var commentMap = {}, seenTicket = {};
  ksl4Active.forEach(function(r){
    if (seenTicket[r.ticket]) return;   // dedupe per unique ticket
    seenTicket[r.ticket] = true;
    var raw = (r.comment && r.comment.trim()) ? r.comment.trim() : '(no comment)';
    /* Truncate very long values to keep the bar chart readable */
    var lbl = raw.length > 60 ? raw.substring(0, 57) + '...' : raw;
    commentMap[lbl] = (commentMap[lbl] || 0) + 1;
  });

  var km1Chart = Object.keys(ACT).length ? _card('KM-1 Action Breakdown', _bar(_top(ACT,10),'#006494')) : '';

  return '<div class="dash-grid">'+
    _card('KSL-4 by Comment',  _bar(_top(commentMap,12),'#006494'))+
    _card('Breach Reasons',    _bar(_top(R,10),'#964219'))+
    _card('Languages',         _bar(_top(L,10),'#437a22'))+
    _card('SLA Breakdown',     _bar(_top(S,8), '#7a39bb'))+
    _card('By Queue',          _bar(_top(Q,8), '#01696f'))+
    _card('By Topic',          _bar(_top(P,8), '#d19900'))+
    km1Chart+'</div>';
}
function _top(map,n){ return Object.keys(map).map(function(k){return[k,map[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,n); }
function _bar(entries,color){
  if(!entries.length) return '<p style="color:var(--muted);font-size:12px">No data</p>';
  var max=entries[0][1];
  return '<div class="bar-chart">'+entries.map(function(e){
    return '<div class="bar-row">'+
      '<div class="bar-lbl" title="'+_esc(e[0])+'">'+_esc(e[0])+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/max*100)+'%;background:'+color+'"></div></div>'+
      '<div class="bar-cnt">'+e[1]+'</div></div>';
  }).join('')+'</div>';
}
function _card(title,body){ return '<div class="sc"><div class="sc-head"><h2>'+title+'</h2></div><div class="sc-body">'+body+'</div></div>'; }
function _esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---- Trends ---- */
function _buildTrends(data) {
  if (!data||!data.length) return '<div class="sc"><div class="sc-head"><h2>Trends</h2></div><div class="sc-body"><p style="color:var(--muted);font-size:12px;padding:20px 0">No data loaded.</p></div></div>';
  var weekSet={};
  data.forEach(function(r){if(r.week)weekSet[r.week]=1;});
  var weeks=Object.keys(weekSet).sort();
  if(!weeks.length) return '<div class="sc"><div class="sc-head"><h2>Trends</h2></div><div class="sc-body"><p style="color:var(--muted);font-size:12px;padding:20px 0">No week data found.</p></div></div>';
  var COLS=[
    {key:'total', label:'Total', rgb:[40,37,29],   f:function(r){return true;}},
    {key:'ksl4',  label:'KSL-4', rgb:[0,100,148],  f:function(r){return r.sla==='KSL-4';}},
    {key:'km1',   label:'KM-1',  rgb:[0,100,148],  f:function(r){return r.sla==='KM-1';}},
    {key:'ksl5a', label:'KSL-5a',rgb:[150,66,25],  f:function(r){return r.sla==='KSL-5a';}},
    {key:'km2',   label:'KM-2',  rgb:[122,57,187], f:function(r){return r.sla==='KM-2';}},
    {key:'aos',   label:'AOS',   rgb:[1,105,111],  f:function(r){return r.isAos;}},
    {key:'excl',  label:'Excl',  rgb:[160,44,123], f:function(r){return r.excluded==='Y';}}
  ];
  var activeData=data.filter(function(r){return r.excluded==='N';});
  function countUniqByWeek(rows,weekVal){var seen={};rows.forEach(function(r){if(r.week===weekVal&&r.ticket)seen[r.ticket]=1;});return Object.keys(seen).length;}
  var matrix={};
  COLS.forEach(function(col){
    matrix[col.key]={};
    var src=(col.key==='total'||col.key==='excl')?data:activeData;
    var filtered=src.filter(col.f);
    weeks.forEach(function(w){matrix[col.key][w]=countUniqByWeek(filtered,w);});
  });
  var colMax={};
  COLS.forEach(function(col){var m=0;weeks.forEach(function(w){if(matrix[col.key][w]>m)m=matrix[col.key][w];});colMax[col.key]=m||1;});
  var BASE_RGB=[247,246,242];
  function cellStyle(col,val){
    if(val===0) return 'background:#f0eeea;color:#bab9b4';
    var ratio=Math.pow(val/colMax[col.key],0.6);
    var tr=col.rgb[0],tg=col.rgb[1],tb=col.rgb[2];
    var r=Math.round(BASE_RGB[0]+ratio*(tr-BASE_RGB[0])),g=Math.round(BASE_RGB[1]+ratio*(tg-BASE_RGB[1])),b=Math.round(BASE_RGB[2]+ratio*(tb-BASE_RGB[2]));
    return 'background:rgb('+r+','+g+','+b+');color:'+(0.299*r+0.587*g+0.114*b<145?'#ffffff':'#28251d');
  }
  function deltaStyle(val){if(val>0)return 'background:#fce8e8;color:#a12c3a';if(val<0)return 'background:#e3f2e8;color:#2e6b38';return 'background:#f0eeea;color:#bab9b4';}
  function deltaLabel(val){if(val===null)return '&#8212;';if(val===0)return '&#177;0';return(val>0?'+':'')+val;}
  var thead='<thead><tr><th class="tt-row-lbl">Week</th>'+COLS.map(function(c){return '<th>'+_esc(c.label)+'</th>';}).join('')+'</tr></thead>';
  var tbodyRows='';
  weeks.forEach(function(w,wi){
    tbodyRows+='<tr><td class="tt-row-lbl">'+_esc(w)+'</td>'+COLS.map(function(col){var v=matrix[col.key][w];return '<td style="'+cellStyle(col,v)+'" title="'+_esc(col.label)+' | '+_esc(w)+' : '+v+' unique ticket(s)">'+v+'</td>';}).join('')+'</tr>';
    tbodyRows+='<tr class="delta-row"><td class="tt-row-lbl" style="color:var(--faint,#bab9b4);font-size:9px">WoW &#916;</td>'+COLS.map(function(col){if(wi===0)return '<td style="'+deltaStyle(null)+'">&#8212;</td>';var d=matrix[col.key][w]-matrix[col.key][weeks[wi-1]];return '<td style="'+deltaStyle(d)+'" title="WoW delta '+_esc(col.label)+' | '+_esc(w)+'">'+deltaLabel(d)+'</td>';}).join('')+'</tr>';
  });
  var summaryRow='<tr style="border-top:2px solid var(--border)"><td class="tt-row-lbl" style="font-weight:700;color:var(--text)">All weeks</td>'+COLS.map(function(col){var total=0;weeks.forEach(function(w){total+=matrix[col.key][w];});return '<td style="background:var(--bg);font-weight:700;color:var(--text);border-radius:5px">'+total+'</td>';}).join('')+'</tr>';
  var legendItems=COLS.map(function(col){return '<div class="trends-legend-item"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgb('+col.rgb[0]+','+col.rgb[1]+','+col.rgb[2]+')"></span><span>'+_esc(col.label)+'</span></div>';}).join('');
  return '<div class="sc"><div class="sc-head"><h2>Weekly KPI Trends</h2><span class="badge">'+weeks.length+' week'+(weeks.length!==1?'s':'')+' &bull; '+window.RPT.countUniqueTickets(data)+' unique ticket(s)</span></div>'+
    '<div class="sc-body"><div class="trend-table-wrap"><table class="trend-table">'+thead+'<tbody>'+tbodyRows+summaryRow+'</tbody></table></div>'+
    '<div class="trends-legend" style="margin-top:12px">'+legendItems+'</div>'+
    '<p style="font-size:10px;color:var(--faint);margin-top:8px">Counts = unique Incident Tickets per week. Total &amp; Excl include all rows; other columns count active (Excluded=N) rows only. WoW &#916; row shows change vs. previous week.</p></div></div>';
}

/* ---- Heatmap ---- */
function _buildHeatmap(data) {
  function parseBreach(str){
    if(!str) return null;
    var parts=str.split(' ');
    if(parts.length<2) return null;
    var dp=parts[0].split('.'),tp=parts[1].split(':');
    if(dp.length<3||tp.length<2) return null;
    var d=new Date(Date.UTC(parseInt(dp[2],10),parseInt(dp[1],10)-1,parseInt(dp[0],10),parseInt(tp[0],10)));
    if(isNaN(d.getTime())) return null;
    return{dow:(d.getUTCDay()+6)%7,hour:parseInt(tp[0],10)};
  }
  var days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  function buildMatrix(rows){
    var mx=[],i,j;for(i=0;i<7;i++){mx.push([]);for(j=0;j<24;j++)mx[i].push(0);}
    rows.forEach(function(r){var p=parseBreach(r.dateTimeBreach);if(p)mx[p.dow][p.hour]++;});
    return mx;
  }
  function renderHM(mx,accentRgb){
    var i,j,maxVal=0;
    for(i=0;i<7;i++)for(j=0;j<24;j++)if(mx[i][j]>maxVal)maxVal=mx[i][j];
    if(!maxVal)maxVal=1;
    var BR=247,BG=246,BB=242,TR=accentRgb[0],TG=accentRgb[1],TB=accentRgb[2];
    function hmC(v){if(!v)return 'background:#f0eeea;color:var(--faint)';var ratio=Math.pow(v/maxVal,0.65),r=Math.round(BR+ratio*(TR-BR)),g=Math.round(BG+ratio*(TG-BG)),b=Math.round(BB+ratio*(TB-BB));return 'background:rgb('+r+','+g+','+b+');color:'+(0.299*r+0.587*g+0.114*b<140?'#ffffff':'#28251d');}
    var hdr='<th></th>';for(j=0;j<24;j++)hdr+='<th>'+(j%2===0?String(j).padStart(2,'0')+'h':'')+'</th>';
    var body=days.map(function(dn,di){var c='<td class="hm-day-lbl">'+dn+'</td>';for(j=0;j<24;j++){var v=mx[di][j];c+='<td style="'+hmC(v)+'" title="'+dn+' '+String(j).padStart(2,'0')+':00 \u2014 '+v+' breach(es)">'+(v>0?v:'')+'</td>';}return '<tr>'+c+'</tr>';}).join('');
    var sw='';[0,.2,.4,.6,.8,1].forEach(function(r){var rr=Math.round(BR+r*(TR-BR)),gg=Math.round(BG+r*(TG-BG)),bb=Math.round(BB+r*(TB-BB));sw+='<span style="background:rgb('+rr+','+gg+','+bb+')"></span>';});
    return '<div class="heatmap-wrap"><table class="heatmap-table"><thead><tr>'+hdr+'</tr></thead><tbody>'+body+'</tbody></table><div class="hm-legend"><span>Less</span><div class="hm-legend-swatch">'+sw+'</div><span>More</span></div></div>';
  }
  var SLAs=[{key:'KSL-4',rgb:[0,100,148]},{key:'KM-1',rgb:[0,100,148]},{key:'KSL-5a',rgb:[150,66,25]},{key:'KM-2',rgb:[122,57,187]}];
  var active=data.filter(function(r){return r.excluded==='N';});
  var combinedMx=buildMatrix(active);
  var panels=SLAs.map(function(s){
    var rows=active.filter(function(r){return r.sla===s.key;});
    var mx=buildMatrix(rows);
    return '<div class="kpi-hm-panel"><div class="kpi-hm-head"><h3>'+s.key+'</h3><span class="badge">'+rows.length+' events</span></div><div class="kpi-hm-body">'+renderHM(mx,s.rgb)+'</div></div>';
  }).join('');
  return '<div class="sc"><div class="sc-head"><h2>Breach Heatmap — Combined (Active)</h2><span class="badge">'+active.length+' events</span></div><div class="sc-body">'+renderHM(combinedMx,[1,105,111])+'</div></div>'+
    '<div class="kpi-heatmap-grid">'+panels+'</div>';
}

/* ---- Overview ---- */
function _buildOverview(data) {
  var wkSet={};
  data.forEach(function(r){if(r.week)wkSet[r.week]=1;});
  var weeks=Object.keys(wkSet).sort();
  var SLAs=['KSL-4','KM-1','KSL-5a','KM-2'];
  function uniq(rows){var s={};rows.forEach(function(r){if(r.ticket)s[r.ticket]=1;});return Object.keys(s).length;}
  var thead='<tr><th>Week</th><th>Total</th><th>Active</th><th>Excl</th><th>AOS</th>'+SLAs.map(function(s){return '<th>'+s+'</th>';}).join('')+'</tr>';
  var tbody=weeks.map(function(w){
    var wr=data.filter(function(r){return r.week===w;});
    var wa=wr.filter(function(r){return r.excluded==='N';});
    return '<tr><td>'+_esc(w)+'</td><td>'+uniq(wr)+'</td><td>'+uniq(wa)+'</td>'+
      '<td>'+(uniq(wr)-uniq(wa))+'</td><td>'+uniq(wa.filter(function(r){return r.isAos;}))+'</td>'+
      SLAs.map(function(s){return '<td>'+uniq(wa.filter(function(r){return r.sla===s;}))+'</td>';}).join('')+'</tr>';
  }).join('');
  return '<div class="sc"><div class="sc-head"><h2>Weekly Overview</h2></div><div class="sc-body"><div style="overflow-x:auto"><table class="dt"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div></div></div>';
}

/* ---- Table ---- */
function _buildTable(title, rows, tab) {
  var uniq={};rows.forEach(function(r){if(r.ticket)uniq[r.ticket]=1;});
  var badge=Object.keys(uniq).length+' unique ticket(s) / '+rows.length+' row(s)';
  var sliced=rows.slice((_currentPage-1)*PAGE_SIZE, _currentPage*PAGE_SIZE);
  var aosCol=(tab==='aos');
  var thead='<tr>'+
    '<th>Ticket</th><th>Week</th><th>SLA</th><th>Language</th><th>Tool</th>'+
    '<th>Queue</th><th>Reason</th>'+(aosCol?'<th>AOS Issue</th>':'')+'<th>Excl</th>'+
  '</tr>';
  var tbody=sliced.map(function(r){
    return '<tr class="'+(r.excluded==='Y'?'excl':'')+'">'+
      '<td style="font-family:monospace;font-size:11px">'+_esc(r.ticket)+'</td>'+
      '<td>'+_esc(r.week)+'</td>'+
      '<td><span class="chip ch-'+String(r.sla).toLowerCase().replace(/[^a-z0-9]/g,'')+'">'+_esc(r.sla)+'</span></td>'+
      '<td>'+_esc(r.language)+'</td>'+
      '<td>'+_esc(r.tool)+'</td>'+
      '<td>'+_esc(r.queue)+'</td>'+
      '<td>'+_esc(r.reason)+'</td>'+
      (aosCol?'<td style="font-size:11px;color:#006494">'+_esc(r.aosIssue||'')+'</td>':'')+
      '<td style="text-align:center">'+(r.excluded==='Y'?'<span class="chip ch-other">Y</span>':'')+'</td>'+
    '</tr>';
  }).join('');
  var totalPages=Math.ceil(rows.length/PAGE_SIZE)||1;
  var pg='';
  if(totalPages>1){
    pg='<div class="pg">';
    pg+='<button class="pg-btn" '+((_currentPage===1)?'disabled':'')+' onclick="_goPage('+(_currentPage-1)+')">&#8592;</button>';
    var s=Math.max(1,_currentPage-2),e=Math.min(totalPages,s+4);
    for(var i=s;i<=e;i++) pg+='<button class="pg-btn'+(i===_currentPage?' on':'')+'" onclick="_goPage('+i+')">'+i+'</button>';
    pg+='<button class="pg-btn" '+((_currentPage===totalPages)?'disabled':'')+' onclick="_goPage('+(_currentPage+1)+')">&#8594;</button>';
    pg+='<span style="margin-left:4px">'+_currentPage+'/'+totalPages+'</span></div>';
  }
  return '<div class="sc"><div class="sc-head"><h2>'+_esc(title)+'</h2><span class="badge">'+badge+'</span></div>'+
    '<div class="sc-body"><div style="overflow-x:auto"><table class="dt"><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table></div>'+pg+'</div></div>';
}

function _goPage(p){
  _currentPage=p;
  var data=window.RPT?window.RPT.filtered:[];
  var el=document.getElementById('tab-content');
  if(!el) return;
  if(_currentTab==='ksl4'){
    el.innerHTML=_buildKsl4Pivot(_currentTabRows)+_buildTable('KSL-4 — All Records',_currentTabRows,'ksl4');
  } else {
    var labels={all:'All Records',km1:'KM-1',ksl5a:'KSL-5a',km2:'KM-2',aos:'AOS Records'};
    el.innerHTML=_buildTable(labels[_currentTab]||_currentTab,_currentTabRows,_currentTab);
  }
}

/* ---- Jira Tracker ---- */
function _buildJiraTracker(data) {
  var jRows=data.filter(function(r){return r.jiraTicket&&r.jiraTicket.trim();});
  if(!jRows.length) return '<div class="sc"><div class="sc-head"><h2>Jira Tracker</h2></div><div class="sc-body"><p style="color:var(--muted);font-size:12px;padding:20px 0">No Jira tickets in current data.</p></div></div>';
  var byJ={};
  jRows.forEach(function(r){
    var k=r.jiraTicket.trim();
    if(!byJ[k]) byJ[k]={rows:[],slas:new Set(),weeks:new Set(),queues:new Set()};
    byJ[k].rows.push(r);
    if(r.sla) byJ[k].slas.add(r.sla);
    if(r.week) byJ[k].weeks.add(r.week);
    if(r.queue) byJ[k].queues.add(r.queue);
  });
  var keys=Object.keys(byJ).sort();
  var h='<div class="sc"><div class="sc-head"><h2>Jira Tracker</h2><span class="badge">'+keys.length+' Jira ticket(s)</span></div><div class="sc-body"><div style="overflow-x:auto"><table class="dt"><thead><tr>'+
    '<th>Jira</th><th>SLA(s)</th><th>Week(s)</th><th>Queue(s)</th><th>Rows</th><th>Excl</th>'+
    '</tr></thead><tbody>';
  keys.forEach(function(k){
    var g=byJ[k];
    var exc=g.rows.every(function(r){return r.excluded==='Y';});
    h+='<tr class="'+(exc?'excl':'')+'">'+
      '<td><a class="jira-link" href="https://jira.atlassian.com/browse/'+_esc(k)+'" target="_blank">'+_esc(k)+'</a></td>'+
      '<td>'+Array.from(g.slas).map(function(s){return '<span class="chip ch-'+String(s).toLowerCase().replace(/[^a-z0-9]/g,'')+'">'+_esc(s)+'</span>';}).join(' ')+'</td>'+
      '<td>'+_esc(Array.from(g.weeks).sort().join(', '))+'</td>'+
      '<td>'+_esc(Array.from(g.queues).join(', '))+'</td>'+
      '<td style="text-align:center;font-weight:700">'+g.rows.length+'</td>'+
      '<td style="text-align:center">'+(exc?'<span class="chip ch-other">Y</span>':'')+'</td>'+
    '</tr>';
  });
  h+='</tbody></table></div></div></div>';
  return h;
}
</script>
