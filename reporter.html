<!DOCTYPE html>
<html lang="en">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breaches Reporter</title>
<style>
:root {
  --color-bg: #f7f6f2;
  --color-surface: #ffffff;
  --color-surface-2: #f3f0ec;
  --color-border: #d4d1ca;
  --color-divider: #e0ddd8;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-light: #cedcd8;
  --color-error: #a12c7b;
  --color-warning: #964219;
  --color-success: #437a22;
  --color-km1: #006494;
  --color-km2: #7a39bb;
  --color-ksl4: #01696f;
  --color-ksl5a: #964219;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --radius: 8px;
  --radius-sm: 5px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--color-bg); color: var(--color-text); font-size: 14px; }
a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

/* LAYOUT */
.app { display: flex; flex-direction: column; min-height: 100vh; }
header { background: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; box-shadow: var(--shadow-sm); }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; color: var(--color-text); }
.logo svg { color: var(--color-primary); }
.header-meta { margin-left: auto; color: var(--color-text-muted); font-size: 12px; }
.main { display: flex; flex: 1; gap: 0; flex-wrap: wrap; align-content: flex-start; }
.sidebar { width: 260px; min-width: 260px; background: var(--color-surface); border-right: 1px solid var(--color-border); padding: 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.content { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

/* SIDEBAR FILTERS */
.filter-section h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--color-text-muted); margin-bottom: 8px; }
.filter-group { display: flex; flex-direction: column; gap: 6px; }
select, input[type=text] {
  width: 100%; padding: 7px 10px; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); background: var(--color-bg); color: var(--color-text);
  font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s;
}
select:focus, input:focus { border-color: var(--color-primary); }
label { font-size: 12px; color: var(--color-text-muted); margin-bottom: 2px; }
.btn { padding: 8px 14px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: background .15s; }
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-ghost { background: transparent; color: var(--color-text-muted); border: 1px solid var(--color-border); }
.btn-ghost:hover { background: var(--color-surface-2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.filter-actions { display: flex; gap: 8px; margin-top: 4px; }

/* TABS */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--color-border); }
.tab { padding: 10px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--color-text-muted); transition: color .15s, border-color .15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab:hover { color: var(--color-text); }
.tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

/* KPI CARDS */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.kpi-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); }
.kpi-label { font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 700; line-height: 1; }
.kpi-sub { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; }
.kpi-card.km1 .kpi-value { color: var(--color-km1); }
.kpi-card.km2 .kpi-value { color: var(--color-km2); }
.kpi-card.ksl4 .kpi-value { color: var(--color-ksl4); }
.kpi-card.ksl5a .kpi-value { color: var(--color-ksl5a); }
.kpi-card.total .kpi-value { color: var(--color-text); }

/* SECTION CARD */
.section-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; }
.section-card-header { padding: 14px 18px; border-bottom: 1px solid var(--color-divider); display: flex; align-items: center; gap: 10px; }
.section-card-header h2 { font-size: 14px; font-weight: 600; }
.section-card-header .badge { margin-left: auto; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: 20px; padding: 2px 10px; font-size: 12px; color: var(--color-text-muted); }
.section-card-body { padding: 16px 18px; }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--color-bg); padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { background: var(--color-surface-2); }
th .sort-icon { opacity: .4; margin-left: 4px; font-size: 10px; }
th.sorted .sort-icon { opacity: 1; }
td { padding: 8px 12px; border-bottom: 1px solid var(--color-divider); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9f8f5; }
.chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.chip-km1 { background: #dce9f3; color: var(--color-km1); }
.chip-km2 { background: #ede3f8; color: var(--color-km2); }
.chip-ksl4 { background: #d6ecec; color: var(--color-ksl4); }
.chip-ksl5a { background: #f2e3d7; color: var(--color-ksl5a); }
.chip-excl { background: #f2f0ec; color: var(--color-text-muted); }
.chip-gr { background: #e8f4d6; color: var(--color-success); }
.chip-de { background: #f5e6d3; color: var(--color-warning); }
.ticket-link { font-family: monospace; font-size: 12px; }
.text-muted { color: var(--color-text-muted); }
.excl-row td { opacity: .5; }

/* AOS TABLE */
.aos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.mini-table { font-size: 12px; }
.mini-table th { font-size: 10px; padding: 6px 10px; }
.mini-table td { padding: 6px 10px; }

/* CHART BARS */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
.bar-label { width: 200px; min-width: 140px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--color-text-muted); text-align: right; }
.bar-track { flex: 1; height: 14px; background: var(--color-bg); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.bar-count { width: 40px; font-weight: 600; font-size: 13px; }

/* PAGINATION */
.pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; justify-content: flex-end; font-size: 12px; color: var(--color-text-muted); }
.page-btn { padding: 4px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-surface); cursor: pointer; font-size: 12px; }
.page-btn:hover { background: var(--color-surface-2); }
.page-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px; color: var(--color-text-muted); }
.empty svg { margin-bottom: 10px; opacity: .3; }

/* DASHBOARD GRID */
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media(max-width:900px) { .dashboard-grid { grid-template-columns: 1fr; } }

/* RESPONSIVE */
@media(max-width:900px) {
  .main { flex-direction: column; }
  .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--color-border); }
  .aos-grid { grid-template-columns: 1fr; }
}
</style>
</head>

// ─── CET date formatter (UTC+2) ─────────────────────────────────────────────
function formatDateCET(val) {
  if (!val) return '';
  const d = (val instanceof Date) ? val : new Date(String(val));
  if (isNaN(d.getTime())) return String(val);
  const local = new Date(d.getTime() + 2 * 3600 * 1000);
  return [
    String(local.getUTCDate()).padStart(2,'0'),
    String(local.getUTCMonth()+1).padStart(2,'0'),
    local.getUTCFullYear()
  ].join('.') + ' ' + [
    String(local.getUTCHours()).padStart(2,'0'),
    String(local.getUTCMinutes()).padStart(2,'0'),
    String(local.getUTCSeconds()).padStart(2,'0')
  ].join(':');
}

let DATA = RAW.map(r => Object.assign({}, r));
let filteredData = [];
let currentTab = 'dashboard';
let sortCol = null, sortDir = 1;
let currentPage = 1;
const PAGE_SIZE = 50;

// ─── UPLOAD HANDLER ──────────────────────────────────────────────────────────
document.getElementById('csvUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const wb = XLSX.read(evt.target.result, { type: 'array', cellDates: true });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
      if (rows.length < 2) { document.getElementById('upload-status').textContent = 'No data rows found.'; return; }
      const headers = rows[0].map(h => String(h).toLowerCase().trim());
      // Column index helpers
      const ci = name => headers.findIndex(h => h.includes(name));
      const iTicket   = ci('ticket');
      const iQueue    = ci('queue');
      const iLang     = ci('lang');
      const iTopic    = ci('topic');
      const iSla      = ci('sla_code') >= 0 ? ci('sla_code') : ci('sla');
      const iReason   = ci('reason');
      const iApp      = ci('application');
      const iAgent    = ci('agent');
      const iBms      = ci('bms');
      const iExcluded = ci('excluded');
      const iWeek     = ci('week');
      const iDate     = ci('date_close') >= 0 ? ci('date_close') : ci('date');
      const iComment  = ci('comment');
      const iSheet    = ci('sheet');
      DATA = rows.slice(1).filter(r => r[iTicket]).map(r => ({
        ticket:      String(r[iTicket] || ''),
        queue:       String(r[iQueue]  || ''),
        lang:        String(r[iLang]   || ''),
        topic:       String(r[iTopic]  || ''),
        sla_code:    String(r[iSla]    || ''),
        reason:      String(r[iReason] || ''),
        application: String(r[iApp]    || ''),
        agent:       String(r[iAgent]  || ''),
        bms:         String(r[iBms]    || '0'),
        excluded:    parseInt(r[iExcluded]) || 0,
        week:        parseInt(r[iWeek])     || 0,
        date_close:  formatDateCET(r[iDate]),
        comment:     String(r[iComment]|| ''),
        sheet:       String(r[iSheet]  || '')
      }));
      document.getElementById('upload-status').textContent = '✓ Loaded ' + DATA.length + ' rows';
      populateFilters();
      applyFilters();
    } catch(err) {
      document.getElementById('upload-status').textContent = '✗ Error: ' + err.message;
    }
  };
  reader.readAsArrayBuffer(file);
});

// ─── FILTER POPULATION ───────────────────────────────────────────────────────
function populateFilters() {
  const weeks    = [...new Set(DATA.map(r => r.week))].sort((a,b) => a-b);
  const slas     = [...new Set(DATA.map(r => r.sla_code).filter(Boolean))].sort();
  const sheets   = [...new Set(DATA.map(r => r.sheet).filter(Boolean))].sort();
  const langs    = [...new Set(DATA.map(r => r.lang).filter(Boolean))].sort();
  const agents   = [...new Set(DATA.map(r => r.agent).filter(Boolean))].sort();
  fillSelect('fWeek',  weeks,  'All Weeks',      v => 'Week ' + v);
  fillSelect('fSLA',   slas,   'All Categories', v => v);
  fillSelect('fSheet', sheets, 'All Groups',     v => v);
  fillSelect('fLang',  langs,  'All Languages',  v => v.toUpperCase());
  fillSelect('fAgent', agents, 'All Agents',     v => v);
}
function fillSelect(id, vals, placeholder, label) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  sel.innerHTML = `<option value="">${placeholder}</option>`
    + vals.map(v => `<option value="${v}">${label(v)}</option>`).join('');
  sel.value = cur;
}

// ─── FILTERS ─────────────────────────────────────────────────────────────────
function applyFilters() {
  const week    = document.getElementById('fWeek').value;
  const sla     = document.getElementById('fSLA').value;
  const sheet   = document.getElementById('fSheet').value;
  const lang    = document.getElementById('fLang').value;
  const agent   = document.getElementById('fAgent').value;
  const excl    = document.getElementById('fExcluded').value;
  const search  = document.getElementById('fSearch').value.trim().toLowerCase();
  filteredData = DATA.filter(r => {
    if (week   && String(r.week)     !== week)    return false;
    if (sla    && r.sla_code         !== sla)     return false;
    if (sheet  && r.sheet            !== sheet)   return false;
    if (lang   && r.lang             !== lang)    return false;
    if (agent  && r.agent            !== agent)   return false;
    if (excl === '0' && r.excluded)              return false;
    if (excl === '2' && !r.excluded)             return false;
    if (search && !r.ticket.toLowerCase().includes(search)) return false;
    return true;
  });
  currentPage = 1;
  renderKPIs(filteredData);
  renderSideStats(filteredData);
  renderTab(currentTab);
}
function resetFilters() {
  ['fWeek','fSLA','fSheet','fLang','fAgent'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fExcluded').value = '0';
  document.getElementById('fSearch').value = '';
  applyFilters();
}

// ─── KPI CARDS ───────────────────────────────────────────────────────────────
function renderKPIs(data) {
  const total  = data.length;
  const excl   = data.filter(r => r.excluded).length;
  const active = total - excl;
  const ksl4   = data.filter(r => r.sla_code === 'KSL-4' && !r.excluded).length;
  const km1    = data.filter(r => r.sla_code === 'KM-1'  && !r.excluded).length;
  const ksl5a  = data.filter(r => r.sla_code === 'KSL-5a'&& !r.excluded).length;
  const km2    = data.filter(r => r.sla_code === 'KM-2'  && !r.excluded).length;
  const weeks  = new Set(data.map(r => r.week)).size;
  document.getElementById('kpiRow').innerHTML = [
    kpiCard('total',  'Total Breaches', total,  weeks + ' week' + (weeks!==1?'s':'')),
    kpiCard('ksl4',   'KSL-4',  ksl4,  pct(ksl4,active)),
    kpiCard('km1',    'KM-1',   km1,   pct(km1, active)),
    kpiCard('ksl5a',  'KSL-5a', ksl5a, pct(ksl5a,active)),
    kpiCard('km2',    'KM-2',   km2,   pct(km2, active)),
    kpiCard('chip-excl','Excluded', excl, pct(excl,total)),
  ].join('');
}
function kpiCard(cls, label, val, sub) {
  return `<div class="kpi-card ${cls}"><div class="kpi-label">${label}</div><div class="kpi-value">${val}</div><div class="kpi-sub">${sub}</div></div>`;
}
function pct(n, d) { return d ? Math.round(n/d*100) + '%' : '0%'; }

// ─── SIDE STATS ──────────────────────────────────────────────────────────────
function renderSideStats(data) {
  const active = data.filter(r => !r.excluded);
  const aosCnt = active.filter(r => r.application === 'AOS Portal').length;
  const agentCnt = active.filter(r => r.agent).length;
  const langs = [...new Set(active.map(r => r.lang).filter(Boolean))].length;
  document.getElementById('sideStats').innerHTML =
    `<div>Active: <strong>${active.length}</strong></div>` +
    `<div>AOS Portal: <strong>${aosCnt}</strong></div>` +
    `<div>Agent breaches: <strong>${agentCnt}</strong></div>` +
    `<div>Languages: <strong>${langs}</strong></div>`;
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  currentTab = name;
  currentPage = 1;
  renderTab(name);
}
function renderTab(name) {
  const el = document.getElementById('tabContent');
  switch(name) {
    case 'dashboard': el.innerHTML = renderDashboard(filteredData); break;
    case 'overview':  el.innerHTML = renderOverview(filteredData);  break;
    case 'ksl4':      el.innerHTML = renderSLATable(filteredData, 'KSL-4');  break;
    case 'km1':       el.innerHTML = renderSLATable(filteredData, 'KM-1');   break;
    case 'ksl5a':     el.innerHTML = renderSLATable(filteredData, 'KSL-5a'); break;
    case 'km2':       el.innerHTML = renderSLATable(filteredData, 'KM-2');   break;
    case 'aos':       el.innerHTML = renderAOS(filteredData);       break;
    case 'all':       el.innerHTML = renderAll(filteredData);       break;
  }
}

// ─── DASHBOARD TAB ───────────────────────────────────────────────────────────
function renderDashboard(data) {
  const active = data.filter(r => !r.excluded);

  // Top Applications
  const appMap = {};
  active.forEach(r => { if (r.application) appMap[r.application] = (appMap[r.application]||0)+1; });
  const topApps = Object.entries(appMap).sort((a,b) => b[1]-a[1]).slice(0,10);

  // Reasons
  const reasonMap = {};
  active.forEach(r => { if (r.reason) reasonMap[r.reason] = (reasonMap[r.reason]||0)+1; });
  const topReasons = Object.entries(reasonMap).sort((a,b) => b[1]-a[1]).slice(0,8);

  // Languages
  const langMap = {};
  active.forEach(r => { if (r.lang) langMap[r.lang.toUpperCase()] = (langMap[r.lang.toUpperCase()]||0)+1; });
  const topLangs = Object.entries(langMap).sort((a,b) => b[1]-a[1]).slice(0,10);

  // SLA breakdown
  const slaMap = {};
  active.forEach(r => { if (r.sla_code) slaMap[r.sla_code] = (slaMap[r.sla_code]||0)+1; });
  const slaEntries = Object.entries(slaMap).sort((a,b) => b[1]-a[1]);

  return `<div class="dashboard-grid">
    <div class="section-card">
      <div class="section-card-header"><h2>Top Applications</h2><span class="badge">${topApps.length}</span></div>
      <div class="section-card-body">${barChart(topApps, 'var(--color-ksl4)')}</div>
    </div>
    <div class="section-card">
      <div class="section-card-header"><h2>Breach Reasons</h2><span class="badge">${topReasons.length}</span></div>
      <div class="section-card-body">${barChart(topReasons, 'var(--color-warning)')}</div>
    </div>
    <div class="section-card">
      <div class="section-card-header"><h2>Languages</h2><span class="badge">${topLangs.length}</span></div>
      <div class="section-card-body">${barChart(topLangs, 'var(--color-km1)')}</div>
    </div>
    <div class="section-card">
      <div class="section-card-header"><h2>SLA Categories</h2><span class="badge">${slaEntries.length}</span></div>
      <div class="section-card-body">${barChart(slaEntries, 'var(--color-km2)')}</div>
    </div>
  </div>`;
}
function barChart(entries, color) {
  if (!entries.length) return '<div class="empty">No data</div>';
  const max = entries[0][1];
  return '<div class="bar-chart">' + entries.map(([label, count]) =>
    `<div class="bar-row">
      <div class="bar-label" title="${label}">${label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/max*100)}%;background:${color}"></div></div>
      <div class="bar-count">${count}</div>
    </div>`
  ).join('') + '</div>';
}

// ─── OVERVIEW TAB ────────────────────────────────────────────────────────────
function renderOverview(data) {
  const bySLA = {};
  data.forEach(r => {
    if (!bySLA[r.sla_code]) bySLA[r.sla_code] = { total:0, excl:0 };
    bySLA[r.sla_code].total++;
    if (r.excluded) bySLA[r.sla_code].excl++;
  });
  const rows = Object.entries(bySLA).map(([sla, s]) =>
    `<tr><td><span class="chip chip-${sla.toLowerCase().replace('-','').replace('a','a')}">${sla}</span></td><td>${s.total}</td><td>${s.total - s.excl}</td><td>${s.excl}</td><td>${pct(s.total-s.excl,s.total)}</td></tr>`
  ).join('');
  return `<div class="section-card">
    <div class="section-card-header"><h2>SLA Overview</h2><span class="badge">${data.length} records</span></div>
    <div class="section-card-body table-wrap">
      <table>
        <thead><tr><th>SLA</th><th>Total</th><th>Active</th><th>Excluded</th><th>Active %</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="5" class="empty">No data</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

// ─── SLA TABLE ───────────────────────────────────────────────────────────────
function renderSLATable(data, sla) {
  const rows = data.filter(r => r.sla_code === sla);
  return sectionTable('Breaches — ' + sla, rows, rows.length);
}
function sectionTable(title, rows, total) {
  const start = (currentPage-1)*PAGE_SIZE;
  const page  = rows.slice(start, start+PAGE_SIZE);
  const trs = page.map(r =>
    `<tr class="${r.excluded ? 'excl-row' : ''}">
      <td class="ticket-link">${r.ticket}</td>
      <td>${r.date_close}</td>
      <td><span class="chip chip-${r.sla_code.toLowerCase().replace('-','').replace('a','a')}">${r.sla_code}</span></td>
      <td>${r.application}</td>
      <td>${r.reason}</td>
      <td>${r.lang.toUpperCase()}</td>
      <td>${r.sheet}</td>
      <td>${r.excluded ? '<span class="chip chip-excl">Excl</span>' : ''}</td>
    </tr>`
  ).join('');
  return `<div class="section-card">
    <div class="section-card-header"><h2>${title}</h2><span class="badge">${total}</span></div>
    <div class="section-card-body table-wrap">
      <table>
        <thead><tr>
          <th>Ticket</th><th>Date Close (CET)</th><th>SLA</th><th>Application</th><th>Reason</th><th>Lang</th><th>Group</th><th>Excl</th>
        </tr></thead>
        <tbody>${trs || '<tr><td colspan="8" class="empty">No records</td></tr>'}</tbody>
      </table>
      ${pagination(total)}
    </div>
  </div>`;
}

// ─── AOS TAB ─────────────────────────────────────────────────────────────────
function renderAOS(data) {
  const aos = data.filter(r => r.application === 'AOS Portal' && !r.excluded);
  return sectionTable('AOS Portal Issues', aos, aos.length);
}

// ─── ALL RECORDS TAB ─────────────────────────────────────────────────────────
function renderAll(data) {
  return sectionTable('All Records', data, data.length);
}

// ─── PAGINATION ──────────────────────────────────────────────────────────────
function pagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  if (pages <= 1) return '';
  let btns = '';
  for (let i = 1; i <= Math.min(pages, 10); i++) {
    btns += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  return `<div class="pagination">
    <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
    ${btns}
    <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>
    <span>${(currentPage-1)*PAGE_SIZE+1}–${Math.min(currentPage*PAGE_SIZE,total)} of ${total}</span>
  </div>`;
}
function goPage(n) {
  const pages = Math.ceil(filteredData.length / PAGE_SIZE);
  currentPage = Math.max(1, Math.min(n, pages));
  renderTab(currentTab);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  populateFilters();
  applyFilters();
  const weeks = [...new Set(DATA.map(r => r.week))].sort((a,b)=>a-b);
  const minW = weeks[0], maxW = weeks[weeks.length-1];
  document.getElementById('headerMeta').textContent =
    DATA.length + ' records · Weeks ' + minW + '–' + maxW;
}
init();
</script>
</body>
