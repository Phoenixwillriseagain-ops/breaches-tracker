<!DOCTYPE html>
<html lang="en">
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breaches Reporter</title>
<style>
:root {
  --color-bg: #f7f6f2;
  --color-surface: #ffffff;
  --color-surface-2: #f3f0ec;
  --color-border: #d4d1ca;
  --color-divider: #e0ddd8;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-light: #cedcd8;
  --color-error: #a12c7b;
  --color-warning: #964219;
  --color-success: #437a22;
  --color-km1: #006494;
  --color-km2: #7a39bb;
  --color-ksl4: #01696f;
  --color-ksl5a: #964219;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --radius: 8px;
  --radius-sm: 5px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--color-bg); color: var(--color-text); font-size: 14px; }
a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

/* LAYOUT */
.app { display: flex; flex-direction: column; min-height: 100vh; }
header { background: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; box-shadow: var(--shadow-sm); }
.logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; color: var(--color-text); }
.logo svg { color: var(--color-primary); }
.header-meta { margin-left: auto; color: var(--color-text-muted); font-size: 12px; }
.main { display: flex; flex: 1; gap: 0; }
.sidebar { width: 260px; min-width: 260px; background: var(--color-surface); border-right: 1px solid var(--color-border); padding: 16px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
.content { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }

/* SIDEBAR FILTERS */
.filter-section h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--color-text-muted); margin-bottom: 8px; }
.filter-group { display: flex; flex-direction: column; gap: 6px; }
select, input[type=text] {
  width: 100%; padding: 7px 10px; border: 1px solid var(--color-border);
  border-radius: var(--radius-sm); background: var(--color-bg); color: var(--color-text);
  font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s;
}
select:focus, input:focus { border-color: var(--color-primary); }
label { font-size: 12px; color: var(--color-text-muted); margin-bottom: 2px; }
.btn { padding: 8px 14px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: background .15s; }
.btn-primary { background: var(--color-primary); color: #fff; }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-ghost { background: transparent; color: var(--color-text-muted); border: 1px solid var(--color-border); }
.btn-ghost:hover { background: var(--color-surface-2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.filter-actions { display: flex; gap: 8px; margin-top: 4px; }

/* TABS */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--color-border); }
.tab { padding: 10px 18px; font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; color: var(--color-text-muted); transition: color .15s, border-color .15s; background: none; border-top: none; border-left: none; border-right: none; font-family: inherit; }
.tab:hover { color: var(--color-text); }
.tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }

/* KPI CARDS */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.kpi-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow-sm); }
.kpi-label { font-size: 11px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 700; line-height: 1; }
.kpi-sub { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; }
.kpi-card.km1 .kpi-value { color: var(--color-km1); }
.kpi-card.km2 .kpi-value { color: var(--color-km2); }
.kpi-card.ksl4 .kpi-value { color: var(--color-ksl4); }
.kpi-card.ksl5a .kpi-value { color: var(--color-ksl5a); }
.kpi-card.total .kpi-value { color: var(--color-text); }

/* SECTION CARD */
.section-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; }
.section-card-header { padding: 14px 18px; border-bottom: 1px solid var(--color-divider); display: flex; align-items: center; gap: 10px; }
.section-card-header h2 { font-size: 14px; font-weight: 600; }
.section-card-header .badge { margin-left: auto; background: var(--color-surface-2); border: 1px solid var(--color-border); border-radius: 20px; padding: 2px 10px; font-size: 12px; color: var(--color-text-muted); }
.section-card-body { padding: 16px 18px; }

/* TABLE */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--color-bg); padding: 8px 12px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { background: var(--color-surface-2); }
th .sort-icon { opacity: .4; margin-left: 4px; font-size: 10px; }
th.sorted .sort-icon { opacity: 1; }
td { padding: 8px 12px; border-bottom: 1px solid var(--color-divider); vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f9f8f5; }
.chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.chip-km1 { background: #dce9f3; color: var(--color-km1); }
.chip-km2 { background: #ede3f8; color: var(--color-km2); }
.chip-ksl4 { background: #d6ecec; color: var(--color-ksl4); }
.chip-ksl5a { background: #f2e3d7; color: var(--color-ksl5a); }
.chip-excl { background: #f2f0ec; color: var(--color-text-muted); }
.chip-gr { background: #e8f4d6; color: var(--color-success); }
.chip-de { background: #f5e6d3; color: var(--color-warning); }
.ticket-link { font-family: monospace; font-size: 12px; }
.text-muted { color: var(--color-text-muted); }
.excl-row td { opacity: .5; }

/* AOS TABLE */
.aos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.mini-table { font-size: 12px; }
.mini-table th { font-size: 10px; padding: 6px 10px; }
.mini-table td { padding: 6px 10px; }

/* CHART BARS */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
.bar-label { width: 200px; min-width: 140px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--color-text-muted); text-align: right; }
.bar-track { flex: 1; height: 14px; background: var(--color-bg); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.bar-count { width: 40px; font-weight: 600; font-size: 13px; }

/* PAGINATION */
.pagination { display: flex; align-items: center; gap: 8px; margin-top: 12px; justify-content: flex-end; font-size: 12px; color: var(--color-text-muted); }
.page-btn { padding: 4px 10px; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-surface); cursor: pointer; font-size: 12px; }
.page-btn:hover { background: var(--color-surface-2); }
.page-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px; color: var(--color-text-muted); }
.empty svg { margin-bottom: 10px; opacity: .3; }

/* RESPONSIVE */
@media(max-width:900px) {
  .main { flex-direction: column; }
  .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--color-border); }
  .aos-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<div class="app">

<header>

    Breaches Reporter

<div class="main">
<!-- UPLOAD BAR -->
<<div id="upload-bar" style="width:100%;background:var(--color-surface);padding:10px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--color-border);flex:0 0 100%;order:-1;">

</div>
  <aside class="sidebar">
    <div class="filter-section">

      <div class="filter-group">
        <label for="fWeek">Week</label>
        <select id="fWeek"><option value="">All Weeks</option></select>

        <label for="fSLA" style="margin-top:8px">SLA Category</label>
        <select id="fSLA"><option value="">All Categories</option></select>

        <label for="fSheet" style="margin-top:8px">Group (GR / DE)</label>
        <select id="fSheet"><option value="">All Groups</option></select>

        <label for="fLang" style="margin-top:8px">Language</label>
        <select id="fLang"><option value="">All Languages</option></select>

        <label for="fAgent" style="margin-top:8px">Agent</label>
        <select id="fAgent"><option value="">All Agents</option></select>

        <label for="fExcluded" style="margin-top:8px">Show Excluded</label>

          <option value="1">Show All</option>
          <option value="2">Only Excluded</option>
        </select>

        <label for="fSearch" style="margin-top:8px">Search Ticket</label>
        <input type="text" id="fSearch" placeholder="INC000…">
      </div>
      <div class="filter-actions" style="margin-top:12px">
        <button class="btn btn-primary btn-sm" onclick="applyFilters()">Apply</button>
        <button class="btn btn-ghost btn-sm" onclick="resetFilters()">Reset</button>
      </div>
    </div>

    <div class="filter-section" style="margin-top:8px">
      <h3>Quick Stats</h3>
      <div id="sideStats" style="font-size:12px; color:var(--color-text-muted); line-height:1.8;"></div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="content">

    <!-- KPI ROW -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- TABS -->
    <div>
      <div class="tabs">
        <button class="tab active" onclick="showTab('overview',this)">Overview</button>
        <button class="tab" onclick="showTab('ksl4',this)">KSL-4</button>
        <button class="tab" onclick="showTab('km1',this)">KM-1</button>
        <button class="tab" onclick="showTab('ksl5a',this)">KSL-5a</button>
        <button class="tab" onclick="showTab('km2',this)">KM-2</button>
        <button class="tab" onclick="showTab('aos',this)">AOS Portal</button>
        <button class="tab" onclick="showTab('all',this)">All Records</button>
      </div>
      <div id="tabContent" style="margin-top:16px;"></div>
    </div>

  </main>
</div><!-- end .main -->
</div><!-- end .app -->

let filtered = [...RAW];
let currentTab = 'overview';
let sortCol = null, sortDir = 1;
let page = 1;
const PER_PAGE = 50;

// ---------- INIT ----------
document.getElementById('csvUpload').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const status = document.getElementById('upload-status');
  status.textContent = '⏳ Caricamento...';
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const parsed = XLSX.utils.sheet_to_json(ws, {defval:''});
      RAW.length = 0;
      parsed.forEach(r => RAW.push(r));
      populateFilters();
      applyFilters();
      status.textContent = `✅ ${parsed.length} righe caricate`;
    } catch(err) {
      status.textContent = '❌ Errore nel file';
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
});
window.addEventListener('DOMContentLoaded', () => {
  populateFilters();
  applyFilters();
});

function populateFilters() {
  const weeks = [...new Set(RAW.map(r=>r.week).filter(w=>w>0))].sort((a,b)=>a-b);
  const slas  = [...new Set(RAW.map(r=>r.sla_code).filter(Boolean))].sort();
  const sheets= [...new Set(RAW.map(r=>r.sheet).filter(Boolean))].sort();
  const langs = [...new Set(RAW.map(r=>r.lang).filter(Boolean))].sort();
  const agents= [...new Set(RAW.map(r=>r.agent).filter(Boolean))].sort();

  fillSelect('fWeek', weeks, w=>`Week ${w}`);
  fillSelect('fSLA', slas);
  fillSelect('fSheet', sheets);
  fillSelect('fLang', langs, l=>l.toUpperCase());
  fillSelect('fAgent', agents);
}

function fillSelect(id, items, labelFn=v=>v) {
  const sel = document.getElementById(id);
  items.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=labelFn(v); sel.appendChild(o); });
}

function applyFilters() {
  const week   = document.getElementById('fWeek').value;
  const sla    = document.getElementById('fSLA').value;
  const sheet  = document.getElementById('fSheet').value;
  const lang   = document.getElementById('fLang').value;
  const agent  = document.getElementById('fAgent').value;
  const excl   = document.getElementById('fExcluded').value; // 0=hide, 1=all, 2=only
  const search = document.getElementById('fSearch').value.trim().toLowerCase();

  filtered = RAW.filter(r => {
    if (week   && r.week != week) return false;
    if (sla    && r.sla_code !== sla) return false;
    if (sheet  && r.sheet !== sheet) return false;
    if (lang   && r.lang !== lang) return false;
    if (agent  && r.agent !== agent) return false;
    if (excl === '0' && r.excluded) return false;
    if (excl === '2' && !r.excluded) return false;
    if (search && !r.ticket.toLowerCase().includes(search)) return false;
    return true;
  });

  page = 1;
  renderAll();
}

function resetFilters() {
  ['fWeek','fSLA','fSheet','fLang','fAgent'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fExcluded').value = '0';
  document.getElementById('fSearch').value = '';
  applyFilters();
}

// ---------- RENDER ALL ----------
function renderAll() {
  renderKPIs();
  renderSideStats();
  updateHeaderMeta();
  renderTab(currentTab);
}

function showTab(tab, btn) {
  currentTab = tab;
  page = 1;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderTab(tab);
}

function renderTab(tab) {
  const el = document.getElementById('tabContent');
  if (tab === 'overview')  el.innerHTML = buildOverview();
  else if (tab === 'ksl4') el.innerHTML = buildSLATable('KSL-4');
  else if (tab === 'km1')  el.innerHTML = buildSLATable('KM-1');
  else if (tab === 'ksl5a')el.innerHTML = buildSLATable('KSL-5a');
  else if (tab === 'km2')  el.innerHTML = buildSLATable('KM-2');
  else if (tab === 'aos')  el.innerHTML = buildAOS();
  else if (tab === 'all')  el.innerHTML = buildAllTable();
}

// ---------- KPIs ----------
function renderKPIs() {
  const active = filtered.filter(r => !r.excluded);
  const byCode = {};
  active.forEach(r => { byCode[r.sla_code] = (byCode[r.sla_code]||0)+1; });

  const defs = [
    {key:'total', label:'Total Breaches', val: active.length, cls:'total'},
    {key:'KSL-4', label:'KSL-4', cls:'ksl4'},
    {key:'KM-1',  label:'KM-1',  cls:'km1'},
    {key:'KSL-5a',label:'KSL-5a',cls:'ksl5a'},
    {key:'KM-2',  label:'KM-2',  cls:'km2'},
  ];

  const exclCount = filtered.filter(r=>r.excluded).length;
  document.getElementById('kpiRow').innerHTML = defs.map(d => {
    const v = d.key === 'total' ? active.length : (byCode[d.key]||0);
    const pct = active.length ? Math.round(v/active.length*100) : 0;
    const sub = d.key==='total' ? `${exclCount} excluded` : `${pct}% of total`;
    return `<div class="kpi-card ${d.cls}">
      <div class="kpi-label">${d.label}</div>
      <div class="kpi-value">${v}</div>
      <div class="kpi-sub">${sub}</div>
    </div>`;
  }).join('');
}

// ---------- SIDE STATS ----------
function renderSideStats() {
  const active = filtered.filter(r=>!r.excluded);
  const grCount = active.filter(r=>r.sheet.includes('GR')).length;
  const deCount = active.filter(r=>r.sheet.includes('DE')).length;
  const aosCount = active.filter(r=>r.topic==='#SW#AOS').length;
  const weeks = [...new Set(active.map(r=>r.week).filter(w=>w>0))].sort((a,b)=>a-b);
  document.getElementById('sideStats').innerHTML = `
    <div>🟢 GR: <strong>${grCount}</strong></div>
    <div>🟠 DE: <strong>${deCount}</strong></div>
    <div>🔵 AOS: <strong>${aosCount}</strong></div>
    <div>📅 Weeks: ${weeks.map(w=>'W'+w).join(', ')||'—'}
  `;
}

function updateHeaderMeta() {
  const active = filtered.filter(r=>!r.excluded);
  document.getElementById('headerMeta').textContent = `${active.length} active breaches · ${filtered.length} total`;
}

// ---------- OVERVIEW ----------
function buildOverview() {
  const active = filtered.filter(r=>!r.excluded);

  // By SLA Code
  const bySLA = {};
  active.forEach(r => { bySLA[r.sla_code] = (bySLA[r.sla_code]||0)+1; });
  const maxSLA = Math.max(...Object.values(bySLA), 1);

  // By Week
  const byWeek = {};
  active.forEach(r => { if(r.week>0) byWeek['W'+r.week] = (byWeek['W'+r.week]||0)+1; });

  // By Top Topics
  const byTopic = {};
  active.forEach(r => { if(r.topic) byTopic[r.topic] = (byTopic[r.topic]||0)+1; });
  const topTopics = Object.entries(byTopic).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxTopic = topTopics.length ? topTopics[0][1] : 1;

  // By Reason (KSL-4 only)
  const byReason = {};
  active.filter(r=>r.sla_code==='KSL-4').forEach(r => { if(r.reason) byReason[r.reason] = (byReason[r.reason]||0)+1; });
  const topReasons = Object.entries(byReason).sort((a,b)=>b[1]-a[1]);
  const maxReason = topReasons.length ? topReasons[0][1] : 1;

  const slaColors = {'KSL-4':'#01696f','KM-1':'#006494','KSL-5a':'#964219','KM-2':'#7a39bb'};

  return `
  <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
    <div class="section-card">
      <div class="section-card-header"><h2>Breaches by SLA Category</h2></div>
      <div class="section-card-body">
        <div class="bar-chart">
          ${Object.entries(bySLA).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
          <div class="bar-row">
            <div class="bar-label">${k}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxSLA*100)}%;background:${slaColors[k]||'#888'}"></div></div>
            <div class="bar-count">${v}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header"><h2>Breaches by Week</h2></div>
      <div class="section-card-body">
        <div class="bar-chart">
          ${Object.entries(byWeek).sort().map(([k,v])=>`
          <div class="bar-row">
            <div class="bar-label">${k}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/Math.max(...Object.values(byWeek),1)*100)}%;background:var(--color-primary)"></div></div>
            <div class="bar-count">${v}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header"><h2>Top 10 Topics</h2></div>
      <div class="section-card-body">
        <div class="bar-chart">
          ${topTopics.map(([k,v])=>`
          <div class="bar-row">
            <div class="bar-label">${k}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxTopic*100)}%;background:#5591c7"></div></div>
            <div class="bar-count">${v}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="section-card-header"><h2>KSL-4 by Reason</h2></div>
      <div class="section-card-body">
        <div class="bar-chart">
          ${topReasons.map(([k,v])=>`
          <div class="bar-row">
            <div class="bar-label">${k}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxReason*100)}%;background:#01696f"></div></div>
            <div class="bar-count">${v}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// ---------- SLA TABLE (KSL-4, KM-1, KSL-5a, KM-2) ----------
function buildSLATable(slaCode) {
  const rows = filtered.filter(r => r.sla_code === slaCode);
  const active = rows.filter(r=>!r.excluded);

  // Summary bar
  const byGrDe = {'GR': active.filter(r=>r.sheet.includes('GR')).length, 'DE': active.filter(r=>r.sheet.includes('DE')).length};
  const byReason = {};
  active.forEach(r => { if(r.reason) byReason[r.reason]=(byReason[r.reason]||0)+1; });
  const maxR = Math.max(...Object.values(byReason),1);

  let summaryHtml = '';
  if (Object.keys(byReason).length) {
    summaryHtml = `
    <div class="section-card" style="margin-bottom:16px;">
      <div class="section-card-header"><h2>${slaCode} — Breakdown by ${slaCode==='KSL-5a'?'Breach Type':'Reason'}</h2>
        <span class="badge">${active.length} active</span>
      </div>
      <div class="section-card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <div style="font-size:12px;color:var(--color-text-muted);margin-bottom:10px;">GR: <strong>${byGrDe.GR}</strong> &nbsp; DE: <strong>${byGrDe.DE}</strong></div>
          <div class="bar-chart">
            ${Object.entries(byReason).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
            <div class="bar-row">
              <div class="bar-label">${k||'—'}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxR*100)}%;background:var(--color-primary)"></div></div>
              <div class="bar-count">${v}</div>
            </div>`).join('')}
          </div>
        </div>
        <div>${buildAgentTable(active)}</div>
      </div>
    </div>`;
  }

  // Table cols depend on SLA type
  const cols = getSLACols(slaCode);
  const paged = paginate(rows);
  const totalPages = Math.ceil(rows.length / PER_PAGE);

  return summaryHtml + `
  <div class="section-card">
    <div class="section-card-header">
      <h2>${slaCode} — All Records</h2>
      <span class="badge">${rows.length} rows</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
        <tbody>${paged.map(r=>buildRow(r, cols, slaCode)).join('')}</tbody>
      </table>
    </div>
    ${buildPagination(rows.length, totalPages)}
  </div>`;
}

function getSLACols(slaCode) {
  const base = [
    {key:'ticket',    label:'Ticket'},
    {key:'week',      label:'Week'},
    {key:'sheet',     label:'Group'},
    {key:'lang',      label:'Lang'},
    {key:'topic',     label:'Topic'},
    {key:'sla_code',  label:'SLA'},
  ];
  if (slaCode==='KSL-4') return [...base, {key:'reason',label:'Reason'},{key:'application',label:'Application'},{key:'agent',label:'Agent'},{key:'excluded',label:'Excl.'}];
  if (slaCode==='KM-1')  return [...base, {key:'reason',label:'Reason'},{key:'agent',label:'Agent'},{key:'comment',label:'Comment'},{key:'excluded',label:'Excl.'}];
  if (slaCode==='KSL-5a')return [...base, {key:'reason',label:'Breach Type'},{key:'agent',label:'Agent'},{key:'comment',label:'Comment'},{key:'excluded',label:'Excl.'}];
  if (slaCode==='KM-2')  return [...base, {key:'reason',label:'Reason'},{key:'agent',label:'Agent'},{key:'comment',label:'Comment'},{key:'excluded',label:'Excl.'}];
  return base;
}

function buildRow(r, cols, slaCode) {
  const cls = r.excluded ? 'excl-row' : '';
  const cells = cols.map(c => {
    let v = r[c.key];
    if (c.key==='ticket') return `<td><a class="ticket-link" href="${getTicketURL(r.ticket)}" target="_blank" rel="noopener">${v}</a></td>`;
    if (c.key==='sla_code') return `<td><span class="chip chip-${slugify(v)}">${v}</span></td>`;
    if (c.key==='sheet') {
      const g = v.includes('GR')?'gr':'de';
      return `<td><span class="chip chip-${g}">${v}</span></td>`;
    }
    if (c.key==='excluded') return `<td>${v ? '<span class="chip chip-excl">Excl.</span>' : ''}</td>`;
    if (c.key==='week') return `<td>W${v||'—'}</td>`;
    return `<td>${v||'<span class="text-muted">—</span>'}</td>`;
  });
  return `<tr class="${cls}">${cells.join('')}</tr>`;
}

function getTicketURL(ticket) {
  return `https://bmwgroupprod.service-now.com/incident.do?number=${ticket}`;
}

function slugify(s) {
  return (s||'').toLowerCase().replace(/[^a-z0-9]/g,'');
}

// ---------- AOS TAB ----------
function buildAOS() {
  const aosRows = filtered.filter(r => r.topic === '#SW#AOS');
  const active  = aosRows.filter(r => !r.excluded);

  // Breakdown by SLA Code
  const bySLA = {};
  active.forEach(r => { bySLA[r.sla_code]=(bySLA[r.sla_code]||0)+1; });

  // Breakdown by Reason
  const byReason = {};
  active.forEach(r => { const k=r.reason||'Unknown'; byReason[k]=(byReason[k]||0)+1; });
  const maxR = Math.max(...Object.values(byReason),1);

  // Breakdown by GR/DE
  const byGrDe = {};
  active.forEach(r => { const k=r.sheet.includes('GR')?'GR':'DE'; byGrDe[k]=(byGrDe[k]||0)+1; });

  const slaColors = {'KSL-4':'#01696f','KM-1':'#006494','KSL-5a':'#964219','KM-2':'#7a39bb'};

  const cols = [
    {key:'ticket',label:'Ticket'},
    {key:'week',label:'Week'},
    {key:'sheet',label:'Group'},
    {key:'lang',label:'Lang'},
    {key:'sla_code',label:'SLA'},
    {key:'reason',label:'Reason'},
    {key:'application',label:'Application'},
    {key:'agent',label:'Agent'},
    {key:'excluded',label:'Excl.'},
  ];

  return `
  <div class="section-card" style="margin-bottom:16px;">
    <div class="section-card-header"><h2>AOS Portal — Summary</h2><span class="badge">${active.length} active breaches</span></div>
    <div class="section-card-body">
      <div class="aos-grid">
        <div>
          <div style="font-size:12px;font-weight:600;margin-bottom:10px;color:var(--color-text-muted)">By SLA Category</div>
          <div class="bar-chart">
            ${Object.entries(bySLA).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
            <div class="bar-row">
              <div class="bar-label">${k}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/active.length*100)}%;background:${slaColors[k]||'#888'}"></div></div>
              <div class="bar-count">${v}</div>
            </div>`).join('')}
          </div>
          <div style="font-size:12px;font-weight:600;margin-top:16px;margin-bottom:10px;color:var(--color-text-muted)">GR vs DE</div>
          <div class="bar-chart">
            ${Object.entries(byGrDe).map(([k,v])=>`
            <div class="bar-row">
              <div class="bar-label">${k}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/active.length*100)}%;background:${k==='GR'?'var(--color-success)':'var(--color-warning)'}"></div></div>
              <div class="bar-count">${v}</div>
            </div>`).join('')}
          </div>
        </div>
        <div>
          <div style="font-size:12px;font-weight:600;margin-bottom:10px;color:var(--color-text-muted)">By Reason</div>
          <div class="bar-chart">
            ${Object.entries(byReason).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
            <div class="bar-row">
              <div class="bar-label">${k}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(v/maxR*100)}%;background:#5591c7"></div></div>
              <div class="bar-count">${v}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-card-header"><h2>AOS Portal — All Records</h2><span class="badge">${aosRows.length} rows</span></div>
    <div class="table-wrap">
      <table>
        <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
        <tbody>${aosRows.map(r => buildRow(r, cols, 'KSL-4')).join('')}</tbody>
      </table>
    </div>
  </div>`;
}

// ---------- ALL RECORDS TABLE ----------
function buildAllTable() {
  const paged = paginate(filtered);
  const totalPages = Math.ceil(filtered.length / PER_PAGE);
  const cols = [
    {key:'ticket',label:'Ticket'},
    {key:'week',label:'Week'},
    {key:'sheet',label:'Group'},
    {key:'lang',label:'Lang'},
    {key:'topic',label:'Topic'},
    {key:'sla_code',label:'SLA'},
    {key:'reason',label:'Reason / Breach Type'},
    {key:'application',label:'Application'},
    {key:'agent',label:'Agent'},
    {key:'excluded',label:'Excl.'},
  ];
  return `
  <div class="section-card">
    <div class="section-card-header"><h2>All Records</h2><span class="badge">${filtered.length} rows</span></div>
    <div class="table-wrap">
      <table>
        <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
        <tbody>${paged.map(r=>buildRow(r,cols,r.sla_code)).join('')}</tbody>
      </table>
    </div>
    ${buildPagination(filtered.length, totalPages)}
  </div>`;
}

// ---------- AGENT TABLE ----------
function buildAgentTable(rows) {
  const byAgent = {};
  rows.forEach(r => { if(r.agent) byAgent[r.agent]=(byAgent[r.agent]||0)+1; });
  if (!Object.keys(byAgent).length) return '<div class="text-muted" style="font-size:12px">No agent data</div>';
  const sorted = Object.entries(byAgent).sort((a,b)=>b[1]-a[1]);
  return `
  <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--color-text-muted)">By Agent</div>
  <table class="mini-table">
    <thead><tr><th>Agent</th><th>Count</th></tr></thead>
    <tbody>${sorted.map(([a,n])=>`<tr><td>${a}</td><td><strong>${n}</strong></td></tr>`).join('')}</tbody>
  </table>`;
}

// ---------- PAGINATION ----------
function paginate(rows) {
  return rows.slice((page-1)*PER_PAGE, page*PER_PAGE);
}

function buildPagination(total, totalPages) {
  if (totalPages <= 1) return '';
  let btns = '';
  btns += `<button class="page-btn" onclick="changePage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  const range = [];
  for (let i=1; i<=totalPages; i++) {
    if (i===1||i===totalPages||Math.abs(i-page)<=2) range.push(i);
    else if (range[range.length-1]!=='…') range.push('…');
  }
  range.forEach(p => {
    if (p==='…') btns+=`<span class="page-btn" style="pointer-events:none">…</span>`;
    else btns+=`<button class="page-btn ${p===page?'active':''}" onclick="changePage(${p})">${p}</button>`;
  });
  btns += `<button class="page-btn" onclick="changePage(${page+1})" ${page===totalPages?'disabled':''}>›</button>`;
  return `<div class="pagination"><span>${total} rows · Page ${page} of ${totalPages}</span>${btns}</div>`;
}

function changePage(p) {
  page = p;
  renderTab(currentTab);
}
</script>
