<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breaches Reporter</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <style>
    /* ── Reporter-specific overrides ─────────────────────────────── */
    .reporter-layout { display:flex; flex:1; min-height:0; }
    .reporter-sidebar {
      width:220px; min-width:220px; flex-shrink:0;
      background:var(--color-surface);
      border-right:1px solid var(--color-border);
      padding:var(--space-4);
      display:flex; flex-direction:column; gap:var(--space-4);
      overflow-y:auto;
    }
    .reporter-sidebar h3 {
      font-size:11px; font-weight:700; text-transform:uppercase;
      letter-spacing:.06em; color:var(--color-text-muted);
      margin-bottom:var(--space-2);
    }
    .filter-block { display:flex; flex-direction:column; gap:var(--space-2); }
    .filter-block label { font-size:11px; color:var(--color-text-muted); }
    .filter-block select {
      width:100%; padding:6px 8px;
      border:1px solid var(--color-border);
      border-radius:6px; background:var(--color-bg);
      font-size:12px; color:var(--color-text); font-family:inherit;
    }
    .filter-block select:focus { outline:none; border-color:var(--color-primary); }
    .reporter-main { flex:1; overflow-y:auto; padding:var(--space-6); display:flex; flex-direction:column; gap:var(--space-5); }

    /* ── Upload section ──────────────────────────────────────────── */
    #upload-section {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; flex:1; gap:var(--space-4);
      min-height:340px;
    }
    .upload-zone {
      width:100%; max-width:480px;
      border:2px dashed var(--color-border);
      border-radius:12px; padding:48px 32px;
      text-align:center; cursor:pointer;
      transition:border-color .15s, background .15s;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color:var(--color-primary);
      background:var(--color-primary-highlight, #cedcd8);
    }
    .upload-zone svg { color:var(--color-text-faint); margin:0 auto var(--space-3); display:block; }
    .upload-zone p { font-size:15px; font-weight:600; margin-bottom:var(--space-1); }
    .upload-zone span { font-size:12px; color:var(--color-text-muted); }
    #upload-status { font-size:13px; }
    #upload-status.ok  { color:var(--color-success); }
    #upload-status.err { color:var(--color-error); }

    /* ── Data section ────────────────────────────────────────────── */
    #data-section { display:none; }

    /* ── KPI row ─────────────────────────────────────────────────── */
    .kpi-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:var(--space-3); }
    .kpi-card {
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:10px; padding:var(--space-4);
      box-shadow:0 1px 3px rgba(0,0,0,.05);
    }
    .kpi-card .kpi-label { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--color-text-muted); margin-bottom:var(--space-1); }
    .kpi-card .kpi-value { font-size:28px; font-weight:700; line-height:1; }
    .kpi-card .kpi-sub   { font-size:11px; color:var(--color-text-muted); margin-top:var(--space-1); }
    .kpi-card.c-total  .kpi-value { color:var(--color-text); }
    .kpi-card.c-ksl4   .kpi-value { color:#006494; }
    .kpi-card.c-km1    .kpi-value { color:#006494; }
    .kpi-card.c-ksl5a  .kpi-value { color:#964219; }
    .kpi-card.c-km2    .kpi-value { color:#7a39bb; }
    .kpi-card.c-excl   .kpi-value { color:var(--color-text-muted); }
    .kpi-card.c-aos    .kpi-value { color:var(--color-primary); }

    /* ── Section card ────────────────────────────────────────────── */
    .section-card {
      background:var(--color-surface); border:1px solid var(--color-border);
      border-radius:10px; overflow:hidden;
      box-shadow:0 1px 3px rgba(0,0,0,.05);
    }
    .section-card-head {
      padding:12px 18px; border-bottom:1px solid var(--color-border);
      display:flex; align-items:center; gap:10px;
    }
    .section-card-head h2 { font-size:14px; font-weight:600; }
    .section-card-head .badge {
      margin-left:auto; background:var(--color-surface-2,#f3f0ec);
      border:1px solid var(--color-border); border-radius:20px;
      padding:2px 10px; font-size:12px; color:var(--color-text-muted);
    }
    .section-card-body { padding:16px 18px; overflow-x:auto; }

    /* ── Bar chart ───────────────────────────────────────────────── */
    .bar-chart { display:flex; flex-direction:column; gap:8px; }
    .bar-row   { display:flex; align-items:center; gap:10px; font-size:12px; }
    .bar-label { width:180px; min-width:120px; text-align:right; color:var(--color-text-muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .bar-track { flex:1; height:13px; background:var(--color-surface-2,#f3f0ec); border-radius:4px; overflow:hidden; }
    .bar-fill  { height:100%; border-radius:4px; transition:width .4s; }
    .bar-count { width:36px; font-weight:600; font-size:12px; text-align:right; }

    /* ── Data tables ─────────────────────────────────────────────── */
    .data-table { width:100%; border-collapse:collapse; font-size:12px; }
    .data-table th {
      background:var(--color-bg); padding:7px 10px;
      text-align:left; font-size:11px; font-weight:600;
      text-transform:uppercase; letter-spacing:.04em;
      color:var(--color-text-muted); border-bottom:1px solid var(--color-border);
      white-space:nowrap;
    }
    .data-table td { padding:7px 10px; border-bottom:1px solid var(--color-divider,#e8e5e0); vertical-align:top; }
    .data-table tr:last-child td { border-bottom:none; }
    .data-table tr:hover td { background:#f9f8f5; }
    .data-table tr.excl-row td { opacity:.45; }
    .chip {
      display:inline-block; padding:2px 8px; border-radius:20px;
      font-size:11px; font-weight:600;
    }
    .chip-ksl4  { background:#dce9f3; color:#006494; }
    .chip-km1   { background:#dce9f3; color:#006494; }
    .chip-ksl5a { background:#f2e3d7; color:#964219; }
    .chip-km2   { background:#ede3f8; color:#7a39bb; }
    .chip-excl  { background:#f0eeea; color:var(--color-text-muted); }
    .chip-y     { background:#d6ecec; color:var(--color-primary); }
    .chip-n     { background:#f0eeea; color:var(--color-text-muted); }

    /* ── Tabs ────────────────────────────────────────────────────── */
    .tabs { display:flex; gap:0; border-bottom:2px solid var(--color-border); flex-wrap:wrap; }
    .tab-btn {
      padding:9px 16px; font-size:13px; font-weight:500; cursor:pointer;
      border:none; background:none; font-family:inherit;
      color:var(--color-text-muted);
      border-bottom:2px solid transparent; margin-bottom:-2px;
      transition:color .15s, border-color .15s;
    }
    .tab-btn:hover  { color:var(--color-text); }
    .tab-btn.active { color:var(--color-primary); border-bottom-color:var(--color-primary); }

    /* ── Pagination ──────────────────────────────────────────────── */
    .pagination { display:flex; align-items:center; gap:6px; margin-top:10px; justify-content:flex-end; font-size:12px; color:var(--color-text-muted); }
    .pg-btn {
      padding:3px 9px; border:1px solid var(--color-border);
      border-radius:5px; background:var(--color-surface);
      cursor:pointer; font-size:12px; font-family:inherit;
    }
    .pg-btn:hover   { background:var(--color-surface-2,#f3f0ec); }
    .pg-btn.active  { background:var(--color-primary); color:#fff; border-color:var(--color-primary); }
    .pg-btn:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Action bar ──────────────────────────────────────────────── */
    .action-bar { display:flex; align-items:center; gap:var(--space-3); flex-wrap:wrap; }
    .action-bar .record-count { font-size:12px; color:var(--color-text-muted); margin-left:auto; }

    /* ── Dashboard grid ──────────────────────────────────────────── */
    .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4); }
    @media(max-width:860px) { .dash-grid { grid-template-columns:1fr; } }
    @media(max-width:720px) {
      .reporter-layout { flex-direction:column; }
      .reporter-sidebar { width:100%; min-width:unset; border-right:none; border-bottom:1px solid var(--color-border); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- NAV -->
  <nav class="app-nav">
    <a href="index.html">Breaches Tracker</a>
    <a href="reporter.html" class="active">Reporter</a>
  </nav>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button id="import-btn" class="file-label" type="button">Import V2 File</button>
      <input type="file" id="file-input" accept=".xlsx"
             style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;">
    </div>
    <div class="btn-group" id="export-btns" style="display:none;">
      <button class="btn-outline" onclick="window.RPT.exportFiltered()">Export Filtered</button>
      <button class="btn-outline" onclick="window.RPT.exportReport()">Export All</button>
      <button class="btn-outline" onclick="window.RPT.resetToUpload()">Load New File</button>
    </div>
    <span id="record-count" style="font-size:12px;color:var(--color-text-muted);margin-left:auto;"></span>
  </div>

  <div class="reporter-layout">

    <!-- SIDEBAR FILTERS (hidden until file loaded) -->
    <aside class="reporter-sidebar" id="reporter-sidebar" style="display:none;">
      <div>
        <h3>Filters</h3>
        <div class="filter-block">
          <label>Week</label>
          <select id="filter-week"><option value="All">All</option></select>
          <label>SLA</label>
          <select id="filter-sla"><option value="All">All</option></select>
          <label>Language</label>
          <select id="filter-lang"><option value="All">All</option></select>
          <label>Tool</label>
          <select id="filter-tool"><option value="All">All</option></select>
          <label>Queue</label>
          <select id="filter-queue"><option value="All">All</option></select>
          <label>Sheet / Group</label>
          <select id="filter-sheet"><option value="All">All</option></select>
          <label>Excluded</label>
          <select id="filter-excl"><option value="All">All</option></select>
          <label>AOS</label>
          <select id="filter-aos"><option value="All">All</option></select>
        </div>
      </div>
      <button class="btn-outline" style="margin-top:auto;" onclick="window.RPT.clearFilters()">Reset Filters</button>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="reporter-main">

      <!-- ── UPLOAD STATE ─────────────────────────────────────── -->
      <div id="upload-section">
        <div class="upload-zone" id="drop-zone-reporter">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="12" y1="11" x2="12" y2="17"/>
            <polyline points="9,14 12,11 15,14"/>
          </svg>
          <p>Drop your V2-Breaches.xlsx here</p>
          <span>…or click to browse &nbsp;·&nbsp; accepts .xlsx only</span>
        </div>
        <div id="upload-status"></div>
      </div>

      <!-- ── DATA STATE ────────────────────────────────────────── -->
      <div id="data-section">

        <!-- KPIs -->
        <div class="kpi-row" id="kpi-row"></div>

        <!-- Tabs -->
        <div class="tabs" id="tab-bar">
          <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
          <button class="tab-btn" data-tab="overview">Overview</button>
          <button class="tab-btn" data-tab="all">All Records</button>
          <button class="tab-btn" data-tab="ksl4">KSL-4</button>
          <button class="tab-btn" data-tab="km1">KM-1</button>
          <button class="tab-btn" data-tab="ksl5a">KSL-5a</button>
          <button class="tab-btn" data-tab="km2">KM-2</button>
          <button class="tab-btn" data-tab="aos">AOS</button>
        </div>
        <div id="tab-content" style="margin-top:16px;"></div>

      </div><!-- /data-section -->
    </div><!-- /reporter-main -->
  </div><!-- /reporter-layout -->
</div><!-- /app -->

<!-- Scripts -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>
<script src="reporter-processor.js"></script>
<script src="reporter-exporter.js"></script>

<script>
// ─── File wiring ───────────────────────────────────────────────────────────
(function () {
  var fileInput  = document.getElementById('file-input');
  var importBtn  = document.getElementById('import-btn');
  var dropZone   = document.getElementById('drop-zone-reporter');
  var exportBtns = document.getElementById('export-btns');
  var sidebar    = document.getElementById('reporter-sidebar');

  function loadFile(f) {
    if (!f) return;
    if (!f.name.match(/\.xlsx$/i)) {
      setStatus('Only .xlsx files are accepted.', true);
      return;
    }
    setStatus('Loading ' + f.name + '…', false);
    window.RPT.loadFile(f);
    // Show export buttons & sidebar after load
    exportBtns.style.display = '';
    sidebar.style.display = '';
  }

  function setStatus(msg, isErr) {
    var el = document.getElementById('upload-status');
    el.textContent = msg;
    el.className   = isErr ? 'err' : 'ok';
  }

  importBtn.addEventListener('click', function () { fileInput.click(); });
  fileInput.addEventListener('change', function (e) {
    loadFile(e.target.files[0]);
    fileInput.value = '';
  });

  dropZone.addEventListener('click', function () { fileInput.click(); });
  dropZone.addEventListener('dragover', function (e) {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', function () {
    dropZone.classList.remove('drag-over');
  });
  dropZone.addEventListener('drop', function (e) {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    loadFile(e.dataTransfer.files[0]);
  });

  // Global drop fallback
  document.addEventListener('dragover', function (e) { e.preventDefault(); });
  document.addEventListener('drop', function (e) {
    e.preventDefault();
    if (e.target === dropZone || dropZone.contains(e.target)) return;
    loadFile(e.dataTransfer.files[0]);
  });
})();

// ─── Tab switching ─────────────────────────────────────────────────────────
document.getElementById('tab-bar').addEventListener('click', function (e) {
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderTab(btn.dataset.tab);
});

var currentTab  = 'dashboard';
var currentPage = 1;
var PAGE_SIZE   = 50;

function renderTab(name) {
  currentTab  = name;
  currentPage = 1;
  var data = window.RPT ? window.RPT.filtered : [];
  var el   = document.getElementById('tab-content');
  switch (name) {
    case 'dashboard': el.innerHTML = buildDashboard(data); break;
    case 'overview':  el.innerHTML = buildOverview(data);  break;
    case 'all':       el.innerHTML = buildTable('All Records', data); break;
    case 'ksl4':      el.innerHTML = buildTable('KSL-4',  data.filter(function(r){return r.sla==='KSL-4';}));  break;
    case 'km1':       el.innerHTML = buildTable('KM-1',   data.filter(function(r){return r.sla==='KM-1';}));   break;
    case 'ksl5a':     el.innerHTML = buildTable('KSL-5a', data.filter(function(r){return r.sla==='KSL-5a';})); break;
    case 'km2':       el.innerHTML = buildTable('KM-2',   data.filter(function(r){return r.sla==='KM-2';}));   break;
    case 'aos':       el.innerHTML = buildTable('AOS Records', data.filter(function(r){return r.isAos;})); break;
  }
}

// Called by reporter-processor after data loads / filters change
window.renderTables = function () {
  var data = window.RPT ? window.RPT.filtered : [];
  buildKPIs(data);
  renderTab(currentTab);
};
window.renderCharts = function () { /* charts handled inline in dashboard */ };

// ─── KPIs ──────────────────────────────────────────────────────────────────
function buildKPIs(data) {
  var total  = data.length;
  var active = data.filter(function(r){return r.excluded==='N';}).length;
  var excl   = total - active;
  function bySla(s) { return data.filter(function(r){return r.sla===s && r.excluded==='N';}).length; }
  var aos   = data.filter(function(r){return r.isAos && r.excluded==='N';}).length;
  var weeks = new Set(data.map(function(r){return r.week;}));
  document.getElementById('kpi-row').innerHTML =
    kpiCard('c-total', 'Total',   total,  weeks.size + ' week(s)') +
    kpiCard('c-ksl4',  'KSL-4',  bySla('KSL-4'),  pct(bySla('KSL-4'),  active)) +
    kpiCard('c-km1',   'KM-1',   bySla('KM-1'),   pct(bySla('KM-1'),   active)) +
    kpiCard('c-ksl5a', 'KSL-5a', bySla('KSL-5a'), pct(bySla('KSL-5a'), active)) +
    kpiCard('c-km2',   'KM-2',   bySla('KM-2'),   pct(bySla('KM-2'),   active)) +
    kpiCard('c-aos',   'AOS',    aos,  pct(aos, active)) +
    kpiCard('c-excl',  'Excluded', excl, pct(excl, total));
}
function kpiCard(cls, label, val, sub) {
  return '<div class="kpi-card '+cls+'"><div class="kpi-label">'+label+'</div><div class="kpi-value">'+val+'</div><div class="kpi-sub">'+sub+'</div></div>';
}
function pct(n, d) { return d ? Math.round(n/d*100)+'%' : '0%'; }

// ─── Dashboard ─────────────────────────────────────────────────────────────
function buildDashboard(data) {
  var active = data.filter(function(r){return r.excluded==='N';});
  var appMap={}, reasonMap={}, langMap={}, slaMap={};
  active.forEach(function(r){
    if(r.tool)     appMap[r.tool]         = (appMap[r.tool]||0)+1;
    if(r.reason)   reasonMap[r.reason]    = (reasonMap[r.reason]||0)+1;
    if(r.language) langMap[r.language]    = (langMap[r.language]||0)+1;
    if(r.sla)      slaMap[r.sla]          = (slaMap[r.sla]||0)+1;
  });
  return '<div class="dash-grid">'+
    card('Top Tools',    barChart(topN(appMap,10),   '#006494'))+
    card('Breach Reasons', barChart(topN(reasonMap,8), '#964219'))+
    card('Languages',    barChart(topN(langMap,10),  '#437a22'))+
    card('SLA Breakdown', barChart(topN(slaMap,6),   '#7a39bb'))+
  '</div>';
}
function topN(map, n) {
  return Object.entries(map).sort(function(a,b){return b[1]-a[1];}).slice(0,n);
}
function barChart(entries, color) {
  if (!entries.length) return '<p style="color:var(--color-text-muted);font-size:12px;">No data</p>';
  var max = entries[0][1];
  return '<div class="bar-chart">'+entries.map(function(e){
    return '<div class="bar-row">'+
      '<div class="bar-label" title="'+e[0]+'">'+e[0]+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/max*100)+'%;background:'+color+'"></div></div>'+
      '<div class="bar-count">'+e[1]+'</div>'+
    '</div>';
  }).join('')+'</div>';
}
function card(title, body) {
  return '<div class="section-card"><div class="section-card-head"><h2>'+title+'</h2></div><div class="section-card-body">'+body+'</div></div>';
}

// ─── Overview ──────────────────────────────────────────────────────────────
function buildOverview(data) {
  var map = {};
  data.forEach(function(r){
    if (!map[r.sla]) map[r.sla] = {total:0, active:0, excl:0, aos:0};
    map[r.sla].total++;
    if (r.excluded==='N') map[r.sla].active++; else map[r.sla].excl++;
    if (r.isAos && r.excluded==='N') map[r.sla].aos++;
  });
  var rows = Object.entries(map).sort(function(a,b){return b[1].total-a[1].total;}).map(function(e){
    var s=e[1];
    return '<tr><td>'+chipSla(e[0])+'</td><td>'+s.total+'</td><td>'+s.active+'</td><td>'+s.excl+'</td><td>'+s.aos+'</td><td>'+pct(s.active,s.total)+'</td></tr>';
  }).join('');
  return '<div class="section-card"><div class="section-card-head"><h2>SLA Overview</h2><span class="badge">'+data.length+' records</span></div>'+
    '<div class="section-card-body"><table class="data-table"><thead><tr><th>SLA</th><th>Total</th><th>Active</th><th>Excl</th><th>AOS</th><th>Active%</th></tr></thead>'+
    '<tbody>'+(rows||'<tr><td colspan="6" style="color:var(--color-text-muted);text-align:center;padding:20px;">No data</td></tr>')+'</tbody></table></div></div>';
}

// ─── Generic table ─────────────────────────────────────────────────────────
function buildTable(title, rows) {
  var total = rows.length;
  var start = (currentPage-1)*PAGE_SIZE;
  var page  = rows.slice(start, start+PAGE_SIZE);
  var trs = page.map(function(r){
    return '<tr class="'+(r.excluded==='Y'?'excl-row':'')+'">'+
      '<td style="font-family:monospace;font-size:11px;">'+r.ticket+'</td>'+
      '<td>'+r.dateClosed+'</td>'+
      '<td>'+r.dateTimeBreach+'</td>'+
      '<td>'+chipSla(r.sla)+'</td>'+
      '<td>'+r.tool+'</td>'+
      '<td>'+r.reason+'</td>'+
      '<td>'+r.language+'</td>'+
      '<td>'+r.sheet+'</td>'+
      '<td>'+(r.excluded==='Y'?'<span class="chip chip-excl">Excl</span>':'')+'</td>'+
      '<td>'+(r.isAos?'<span class="chip chip-y">Y</span>':'')+'</td>'+
    '</tr>';
  }).join('');
  return '<div class="section-card">'+
    '<div class="section-card-head"><h2>'+title+'</h2><span class="badge">'+total+' records</span></div>'+
    '<div class="section-card-body">'+
      '<table class="data-table"><thead><tr>'+
        '<th>Ticket</th><th>Date Close (CET)</th><th>Breach Time (CET)</th>'+
        '<th>SLA</th><th>Tool</th><th>Reason</th><th>Lang</th><th>Sheet</th><th>Excl</th><th>AOS</th>'+
      '</tr></thead>'+
      '<tbody>'+(trs||'<tr><td colspan="10" style="color:var(--color-text-muted);text-align:center;padding:20px;">No records</td></tr>')+'</tbody>'+
      '</table>'+
      buildPagination(total)+
    '</div></div>';
}

function chipSla(sla) {
  var map = {'KSL-4':'chip-ksl4','KM-1':'chip-km1','KSL-5a':'chip-ksl5a','KM-2':'chip-km2'};
  var cls = map[sla] || 'chip-excl';
  return '<span class="chip '+cls+'">'+sla+'</span>';
}

// ─── Pagination ─────────────────────────────────────────────────────────────
function buildPagination(total) {
  var pages = Math.ceil(total/PAGE_SIZE);
  if (pages<=1) return '';
  var btns='';
  for (var i=1;i<=Math.min(pages,10);i++) {
    btns += '<button class="pg-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  }
  return '<div class="pagination">'+
    '<button class="pg-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>‹</button>'+
    btns+
    '<button class="pg-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===pages?'disabled':'')+'>›</button>'+
    '<span>'+((currentPage-1)*PAGE_SIZE+1)+'–'+Math.min(currentPage*PAGE_SIZE,total)+' of '+total+'</span>'+
  '</div>';
}
window.goPage = function(n) {
  var pages = Math.ceil((window.RPT?window.RPT.filtered:[]).length/PAGE_SIZE);
  currentPage = Math.max(1,Math.min(n,pages));
  renderTab(currentTab);
};
</script>
