<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breaches Reporter</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <style>
    html, body { height: 100%; }
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    .reporter-layout { display: flex; flex: 1; overflow: hidden; }
    .reporter-sidebar {
      width: 220px; min-width: 220px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
      overflow-y: auto;
    }
    .reporter-sidebar h3 {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 4px;
    }
    .filter-block { display: flex; flex-direction: column; gap: 5px; }
    .filter-block label { font-size: 11px; color: var(--muted); }
    .filter-block select {
      width: 100%; padding: 5px 8px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg);
      font-size: 12px; color: var(--text); font-family: inherit;
    }
    .reporter-main { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

    .toolbar { background: var(--surface); border-bottom: 1px solid var(--divider); padding: 10px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .toolbar-left { display: flex; gap: 8px; }

    #upload-section { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; min-height: 340px; }
    .drop-zone {
      width: 100%; max-width: 480px; border: 2px dashed var(--border);
      border-radius: 12px; padding: 48px 32px; text-align: center; cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .drop-zone:hover, .drop-zone.drag-over { border-color: var(--primary); background: var(--primary-hi); }
    .drop-zone svg { color: var(--faint); margin: 0 auto 12px; display: block; }
    .drop-zone p { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .drop-zone span { font-size: 12px; color: var(--muted); }
    #upload-status { font-size: 13px; }
    #upload-status.ok  { color: var(--success); }
    #upload-status.err { color: var(--error); }

    #data-section { display: none; flex-direction: column; gap: 20px; }
    #data-section.visible { display: flex; }

    /* Import log strip */
    #rpt-import-log {
      display: none;
      margin: 0 0 4px;
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      line-height: 1.8;
      color: var(--text);
    }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .kpi-card .kpi-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: 4px; }
    .kpi-card .kpi-val { font-size: 26px; font-weight: 700; line-height: 1; }
    .kpi-card .kpi-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }
    .kpi-card.c-total .kpi-val  { color: var(--text); }
    .kpi-card.c-ksl4  .kpi-val  { color: #006494; }
    .kpi-card.c-km1   .kpi-val  { color: #006494; }
    .kpi-card.c-ksl5a .kpi-val  { color: #964219; }
    .kpi-card.c-km2   .kpi-val  { color: #7a39bb; }
    .kpi-card.c-aos   .kpi-val  { color: var(--primary); }
    .kpi-card.c-excl  .kpi-val  { color: var(--muted); }

    .sc { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .sc-head { padding: 11px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
    .sc-head h2 { font-size: 13px; font-weight: 600; }
    .sc-head .badge { margin-left: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 2px 10px; font-size: 11px; color: var(--muted); }
    .sc-body { padding: 14px 16px; overflow-x: auto; }

    .bar-chart { display: flex; flex-direction: column; gap: 7px; }
    .bar-row   { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .bar-lbl   { width: 160px; min-width: 90px; text-align: right; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
    .bar-track { flex: 1; height: 12px; background: var(--divider); border-radius: 4px; overflow: hidden; min-width: 60px; }
    .bar-fill  { height: 100%; border-radius: 4px; transition: width .4s; }
    .bar-cnt   { width: 32px; font-weight: 600; font-size: 11px; text-align: right; flex-shrink: 0; }

    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .dash-grid { grid-template-columns: 1fr; } }

    .rpt-tabs { display: flex; border-bottom: 2px solid var(--border); flex-wrap: wrap; gap: 0; }
    .rpt-tab {
      padding: 8px 14px; font-size: 13px; font-weight: 500; cursor: pointer;
      border: none; background: none; font-family: inherit; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .rpt-tab:hover  { color: var(--text); }
    .rpt-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .dt { width: 100%; border-collapse: collapse; font-size: 12px; }
    .dt th { background: var(--bg); padding: 6px 10px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .dt td { padding: 6px 10px; border-bottom: 1px solid var(--divider); vertical-align: top; }
    .dt tr:last-child td { border-bottom: none; }
    .dt tr:hover td { background: var(--surface-2); }
    .dt tr.excl td { opacity: .45; }

    .chip { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .ch-ksl4  { background: #dce9f3; color: #006494; }
    .ch-km1   { background: #dce9f3; color: #006494; }
    .ch-ksl5a { background: #f2e3d7; color: #964219; }
    .ch-km2   { background: #ede3f8; color: #7a39bb; }
    .ch-other { background: #f0eeea; color: var(--muted); }
    .ch-y     { background: #d6ecec; color: var(--primary); }
    .ch-jira  { background: #e8edf8; color: #0052cc; font-family: monospace; }

    .pg { display: flex; align-items: center; gap: 5px; margin-top: 10px; justify-content: flex-end; font-size: 12px; color: var(--muted); }
    .pg-btn { padding: 3px 9px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface); cursor: pointer; font-size: 12px; font-family: inherit; }
    .pg-btn:hover   { background: var(--bg); }
    .pg-btn.on      { background: var(--primary); color: #fff; border-color: var(--primary); }
    .pg-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ---- Language multi-select dropdown ---- */
    .lang-filter-wrap { position: relative; }
    .lang-trigger {
      width: 100%; padding: 5px 8px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg);
      font-size: 12px; color: var(--text); font-family: inherit;
      text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
      transition: border-color .15s;
    }
    .lang-trigger:hover, .lang-trigger.open { border-color: var(--primary); }
    .lang-trigger .lt-arrow { font-size: 9px; color: var(--muted); margin-left: 4px; flex-shrink: 0; }
    .lang-dropdown {
      display: none; position: fixed; z-index: 999;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,.12);
      min-width: 180px; max-width: 240px;
      overflow: hidden;
    }
    .lang-dropdown.open { display: block; }
    .lang-dd-header {
      padding: 7px 10px; border-bottom: 1px solid var(--divider);
      display: flex; gap: 6px;
    }
    .lang-dd-header button {
      font-size: 11px; font-family: inherit; cursor: pointer;
      padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      transition: background .12s;
    }
    .lang-dd-header button:hover { background: var(--primary-hi, #cedcd8); }
    .lang-dd-list {
      max-height: 200px; overflow-y: auto;
      padding: 4px 0;
    }
    .lang-dd-item {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 10px; font-size: 12px; cursor: pointer;
      transition: background .1s;
    }
    .lang-dd-item:hover { background: var(--surface-2, #f3f0ec); }
    .lang-dd-item input[type=checkbox] { margin: 0; cursor: pointer; accent-color: var(--primary); }
    /* ---- end language filter ---- */

    /* ---- Heatmap ---- */
    .heatmap-wrap { overflow-x: auto; }
    .heatmap-table {
      border-collapse: separate;
      border-spacing: 3px;
      font-size: 11px;
      white-space: nowrap;
    }
    .heatmap-table th {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .04em; color: var(--muted); padding: 3px 5px;
      text-align: center; background: none; border: none;
    }
    .heatmap-table td {
      width: 36px; height: 28px; text-align: center;
      border-radius: 4px; font-size: 10px; font-weight: 600;
      cursor: default; transition: transform .1s;
      border: none;
    }
    .heatmap-table td:hover { transform: scale(1.15); z-index: 2; position: relative; }
    .heatmap-table td.hm-day-lbl {
      width: auto; text-align: right; padding-right: 8px;
      color: var(--muted); font-weight: 600; font-size: 10px;
      background: none; cursor: default;
    }
    .heatmap-table td.hm-day-lbl:hover { transform: none; }
    .hm-legend {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; color: var(--muted); margin-top: 10px;
    }
    .hm-legend-swatch { display: flex; gap: 2px; }
    .hm-legend-swatch span {
      display: inline-block; width: 18px; height: 12px; border-radius: 2px;
    }
    /* ---- end Heatmap ---- */

    /* ---- Jira Tracker ---- */
    .jira-link {
      color: #0052cc; text-decoration: none; font-family: monospace;
      font-size: 11px; font-weight: 600;
    }
    .jira-link:hover { text-decoration: underline; }
    /* ---- end Jira Tracker ---- */

    @media (max-width: 720px) {
      .reporter-layout { flex-direction: column; }
      .reporter-sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- NAV -->
  <nav class="app-nav">
    <a href="index.html">Breaches Tracker</a>
    <a href="reporter.html" class="active">Reporter</a>
  </nav>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <button id="import-btn" class="btn-outline">&#8679; Import Breaches File(s)</button>
      <input type="file" id="rpt-file-input" accept=".xlsx" multiple style="display:none">
      <button id="rpt-clear-btn" class="btn-outline"
              style="display:none;color:var(--error,#a12c7b);border-color:var(--error,#a12c7b);"
              title="Clear all loaded data and start fresh">Clear All</button>
    </div>
    <div id="export-btns" style="display:none" class="btn-group">
      <button class="btn-outline" onclick="window.RPT.exportFiltered()">Export Filtered</button>
      <button class="btn-outline" onclick="window.RPT.exportReport()">Export All</button>
    </div>
    <span id="record-count" style="font-size:12px;color:var(--muted);margin-left:auto"></span>
  </div>

  <div class="reporter-layout">

    <!-- SIDEBAR -->
    <aside class="reporter-sidebar" id="rpt-sidebar" style="display:none">
      <div>
        <h3>Filters</h3>
        <div class="filter-block">
          <label>Week</label>    <select id="filter-week"><option value="All">All</option></select>
          <label>SLA</label>     <select id="filter-sla"><option value="All">All</option></select>

          <!-- Language: multi-select checkbox dropdown -->
          <label>Language</label>
          <div class="lang-filter-wrap" id="lang-filter-wrap">
            <button type="button" class="lang-trigger" id="lang-trigger" aria-haspopup="listbox" aria-expanded="false">
              <span id="lang-trigger-label">All</span>
              <span class="lt-arrow">&#9660;</span>
            </button>
            <div class="lang-dropdown" id="lang-dropdown" role="listbox" aria-multiselectable="true">
              <div class="lang-dd-header">
                <button type="button" id="lang-select-all">Select all</button>
                <button type="button" id="lang-deselect-all">Deselect all</button>
              </div>
              <div class="lang-dd-list" id="lang-dd-list"></div>
            </div>
          </div>

          <label>Tool</label>    <select id="filter-tool"><option value="All">All</option></select>
          <label>Queue</label>   <select id="filter-queue"><option value="All">All</option></select>
          <label>Sheet</label>   <select id="filter-sheet"><option value="All">All</option></select>
          <label>Excluded</label><select id="filter-excl"><option value="All">All</option></select>
          <label>AOS</label>     <select id="filter-aos"><option value="All">All</option></select>
        </div>
      </div>
      <button class="btn-outline" style="margin-top:auto" onclick="window.RPT.clearFilters()">Reset Filters</button>
    </aside>

    <!-- MAIN -->
    <main class="reporter-main">

      <div id="rpt-import-log"></div>

      <!-- UPLOAD -->
      <div id="upload-section">
        <div class="drop-zone" id="drop-zone">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="12" y1="11" x2="12" y2="17"/>
            <polyline points="9,14 12,11 15,14"/>
          </svg>
          <p>Drop your Breaches.xlsx file(s) here</p>
          <span>or click to browse &nbsp;&middot;&nbsp; .xlsx only &nbsp;&middot;&nbsp; multiple files supported</span>
        </div>
        <div id="upload-status"></div>
      </div>

      <!-- DATA -->
      <div id="data-section">
        <div class="kpi-row" id="kpi-row"></div>
        <div class="rpt-tabs" id="tab-bar">
          <button class="rpt-tab active" data-tab="dashboard">Dashboard</button>
          <button class="rpt-tab" data-tab="heatmap">Heatmap</button>
          <button class="rpt-tab" data-tab="overview">Overview</button>
          <button class="rpt-tab" data-tab="all">All Records</button>
          <button class="rpt-tab" data-tab="ksl4">KSL-4</button>
          <button class="rpt-tab" data-tab="km1">KM-1</button>
          <button class="rpt-tab" data-tab="ksl5a">KSL-5a</button>
          <button class="rpt-tab" data-tab="km2">KM-2</button>
          <button class="rpt-tab" data-tab="aos">AOS</button>
          <button class="rpt-tab" data-tab="jira">Jira Tracker</button>
        </div>
        <div id="tab-content"></div>
      </div>

    </main>
  </div>
</div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="config.js"></script>

<script>
var _currentTab  = 'dashboard';
var _currentPage = 1;
var PAGE_SIZE    = 50;

window.renderTables = function() {
  var data = window.RPT ? window.RPT.filtered : [];
  _buildKPIs(data);
  _renderTab(_currentTab);
  document.getElementById('rpt-sidebar').style.display = '';
  document.getElementById('export-btns').style.display = '';
  var cb = document.getElementById('rpt-clear-btn');
  if (cb) cb.style.display = '';
  // Toolbar pill: unique tickets (never raw rows)
  var rc = document.getElementById('record-count');
  if (rc) rc.textContent = window.RPT.countUniqueTickets(data) + ' unique ticket(s)';
};
window.renderCharts = function() {};

function _renderTab(name) {
  _currentTab  = name;
  _currentPage = 1;
  var data = window.RPT ? window.RPT.filtered : [];
  var el   = document.getElementById('tab-content');
  if (!el) return;
  if      (name === 'dashboard') el.innerHTML = _buildDashboard(data);
  else if (name === 'heatmap')   el.innerHTML = _buildHeatmap(data);
  else if (name === 'overview')  el.innerHTML = _buildOverview(data);
  else if (name === 'all')       el.innerHTML = _buildTable('All Records', data, 'all');
  else if (name === 'ksl4')      el.innerHTML = _buildTable('KSL-4',  data.filter(function(r){return r.sla==='KSL-4';}), 'ksl4');
  else if (name === 'km1')       el.innerHTML = _buildTable('KM-1',   data.filter(function(r){return r.sla==='KM-1';}),  'km1');
  else if (name === 'ksl5a')     el.innerHTML = _buildTable('KSL-5a', data.filter(function(r){return r.sla==='KSL-5a';}), 'ksl5a');
  else if (name === 'km2')       el.innerHTML = _buildTable('KM-2',   data.filter(function(r){return r.sla==='KM-2';}),  'km2');
  else if (name === 'aos')       el.innerHTML = _buildTable('AOS Records', data.filter(function(r){return r.isAos;}), 'aos');
  else if (name === 'jira')      el.innerHTML = _buildJiraTracker(data);
}

document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('tab-bar').addEventListener('click', function(e) {
    var btn = e.target.closest('.rpt-tab');
    if (!btn) return;
    document.querySelectorAll('.rpt-tab').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    _renderTab(btn.dataset.tab);
  });

  var trigger  = document.getElementById('lang-trigger');
  var dropdown = document.getElementById('lang-dropdown');

  trigger.addEventListener('click', function(e) {
    e.stopPropagation();
    dropdown.classList.contains('open') ? _closeLangDropdown() : _openLangDropdown();
  });

  document.addEventListener('click', function(e) {
    if (!document.getElementById('lang-filter-wrap').contains(e.target)) {
      _closeLangDropdown();
    }
  });

  document.getElementById('lang-select-all').addEventListener('click', function(e) {
    e.stopPropagation();
    document.querySelectorAll('#lang-dd-list input[type=checkbox]').forEach(function(cb) { cb.checked = true; });
    _onLangChange();
  });

  document.getElementById('lang-deselect-all').addEventListener('click', function(e) {
    e.stopPropagation();
    document.querySelectorAll('#lang-dd-list input[type=checkbox]').forEach(function(cb) { cb.checked = false; });
    _onLangChange();
  });
});

function _openLangDropdown() {
  var trigger  = document.getElementById('lang-trigger');
  var dropdown = document.getElementById('lang-dropdown');
  var wrap     = document.getElementById('lang-filter-wrap');
  var rect     = wrap.getBoundingClientRect();
  dropdown.style.top    = (rect.bottom + 4) + 'px';
  dropdown.style.left   = rect.left + 'px';
  dropdown.style.width  = Math.max(rect.width, 180) + 'px';
  dropdown.classList.add('open');
  trigger.classList.add('open');
  trigger.setAttribute('aria-expanded', 'true');
}

function _closeLangDropdown() {
  var trigger  = document.getElementById('lang-trigger');
  var dropdown = document.getElementById('lang-dropdown');
  dropdown.classList.remove('open');
  trigger.classList.remove('open');
  trigger.setAttribute('aria-expanded', 'false');
}

window._onLangChange = function _onLangChange() {
  if (window.RPT) window.RPT.applyFilters();
  _updateLangLabel();
};

function _updateLangLabel() {
  var all     = document.querySelectorAll('#lang-dd-list input[type=checkbox]');
  var checked = document.querySelectorAll('#lang-dd-list input[type=checkbox]:checked');
  var lbl     = document.getElementById('lang-trigger-label');
  if (!lbl) return;
  if (checked.length === 0)        lbl.textContent = 'None';
  else if (checked.length === all.length) lbl.textContent = 'All';
  else if (checked.length <= 2)   lbl.textContent = Array.from(checked).map(function(c){ return c.value; }).join(', ');
  else                             lbl.textContent = checked.length + ' selected';
}

window.getSelectedLanguages = function() {
  var checked = document.querySelectorAll('#lang-dd-list input[type=checkbox]:checked');
  return new Set(Array.from(checked).map(function(c){ return c.value; }));
};
</script>

<script>
/* ---- KPIs ---- */
function _buildKPIs(data) {
  var uniqueTotal = window.RPT.countUniqueTickets(data);
  var activeData  = data.filter(function(r){return r.excluded==='N';});
  var uniqueActive= window.RPT.countUniqueTickets(activeData);
  var excl        = uniqueTotal - uniqueActive;

  function bySla(s){
    return window.RPT.countUniqueTickets(activeData.filter(function(r){return r.sla===s;}));
  }
  var aos = window.RPT.countUniqueTickets(activeData.filter(function(r){return r.isAos;}));
  var wk  = {}; data.forEach(function(r){if(r.week)wk[r.week]=1;});

  document.getElementById('kpi-row').innerHTML =
    _kpi('c-total','Unique Tickets', uniqueTotal, Object.keys(wk).length+' week(s)')+
    _kpi('c-ksl4', 'KSL-4',  bySla('KSL-4'),  _pct(bySla('KSL-4'),  uniqueActive))+
    _kpi('c-km1',  'KM-1',   bySla('KM-1'),   _pct(bySla('KM-1'),   uniqueActive))+
    _kpi('c-ksl5a','KSL-5a', bySla('KSL-5a'), _pct(bySla('KSL-5a'), uniqueActive))+
    _kpi('c-km2',  'KM-2',   bySla('KM-2'),   _pct(bySla('KM-2'),   uniqueActive))+
    _kpi('c-aos',  'AOS',    aos, _pct(aos, uniqueActive))+
    _kpi('c-excl', 'Excluded', excl, _pct(excl, uniqueTotal));
}
function _kpi(cls,lbl,val,sub){
  return '<div class="kpi-card '+cls+'">'+
    '<div class="kpi-lbl">'+lbl+'</div>'+
    '<div class="kpi-val">'+val+'</div>'+
    '<div class="kpi-sub">'+sub+'</div></div>';
}
function _pct(n,d){return d?Math.round(n/d*100)+'%':'0%';}

/* ---- Dashboard ---- */
function _buildDashboard(data) {
  var a = data.filter(function(r){return r.excluded==='N';});
  var T={}, R={}, L={}, S={}, Q={}, P={}, ACT={};
  a.forEach(function(r){
    if(r.tool)     T[r.tool]    =(T[r.tool]||0)+1;
    if(r.reason)   R[r.reason]  =(R[r.reason]||0)+1;
    if(r.language) L[r.language]=(L[r.language]||0)+1;
    if(r.sla)      S[r.sla]     =(S[r.sla]||0)+1;
    if(r.queue)    Q[r.queue]   =(Q[r.queue]||0)+1;
    if(r.topic)    P[r.topic]   =(P[r.topic]||0)+1;
    // KM-1 Action column — only count non-empty values
    if(r.sla==='KM-1' && r.action) ACT[r.action]=(ACT[r.action]||0)+1;
  });

  var km1ActionChart = '';
  if (Object.keys(ACT).length > 0) {
    km1ActionChart = _card('KM-1 Action Breakdown', _bar(_top(ACT,10),'#006494'));
  }

  return '<div class="dash-grid">'+
    _card('Top Tools',      _bar(_top(T,10),'#006494'))+
    _card('Breach Reasons', _bar(_top(R,10),'#964219'))+
    _card('Languages',      _bar(_top(L,10),'#437a22'))+
    _card('SLA Breakdown',  _bar(_top(S,8), '#7a39bb'))+
    _card('By Queue',       _bar(_top(Q,8), '#01696f'))+
    _card('By Topic',       _bar(_top(P,8), '#d19900'))+
    km1ActionChart+
  '</div>';
}
function _top(map,n){
  return Object.keys(map).map(function(k){return[k,map[k]];}).sort(function(a,b){return b[1]-a[1];}).slice(0,n);
}
function _bar(entries,color){
  if(!entries.length) return '<p style="color:var(--muted);font-size:12px">No data</p>';
  var max=entries[0][1];
  return '<div class="bar-chart">'+entries.map(function(e){
    return '<div class="bar-row">'+
      '<div class="bar-lbl" title="'+_esc(e[0])+'">'+_esc(e[0])+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/max*100)+'%;background:'+color+'"></div></div>'+
      '<div class="bar-cnt">'+e[1]+'</div>'+
    '</div>';
  }).join('')+'</div>';
}
function _card(title,body){
  return '<div class="sc"><div class="sc-head"><h2>'+title+'</h2></div><div class="sc-body">'+body+'</div></div>';
}
function _esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---- Heatmap: day-of-week x hour-of-day breach density ---- */
function _buildHeatmap(data) {
  function parseBreach(str) {
    if (!str) return null;
    var parts = str.split(' ');
    if (parts.length < 2) return null;
    var dp = parts[0].split('.'), tp = parts[1].split(':');
    if (dp.length < 3 || tp.length < 2) return null;
    var day=parseInt(dp[0],10), month=parseInt(dp[1],10)-1,
        year=parseInt(dp[2],10), hour=parseInt(tp[0],10);
    if (isNaN(day)||isNaN(month)||isNaN(year)||isNaN(hour)) return null;
    var d = new Date(Date.UTC(year, month, day, hour, 0, 0));
    if (isNaN(d.getTime())) return null;
    return { dow: (d.getUTCDay() + 6) % 7, hour: hour };
  }

  var matrix = [], i, j;
  for (i=0;i<7;i++){matrix.push([]);for(j=0;j<24;j++)matrix[i].push(0);}

  var parsed = 0;
  data.forEach(function(r) {
    if (r.excluded === 'Y') return;
    var p = parseBreach(r.dateTimeBreach);
    if (!p) return;
    matrix[p.dow][p.hour]++;
    parsed++;
  });

  if (parsed === 0) {
    return '<div class="sc"><div class="sc-head"><h2>Breach Heatmap</h2></div>'+
      '<div class="sc-body"><p style="color:var(--muted);font-size:12px;padding:20px 0">'+
      'No parseable DATE_TIME_Breach values in the current filter.</p></div></div>';
  }

  var maxVal = 0;
  for (i=0;i<7;i++) for (j=0;j<24;j++) if (matrix[i][j]>maxVal) maxVal=matrix[i][j];

  var BR=247,BG=246,BB=242, TR=1,TG=105,TB=111;
  function hmColor(val) {
    if (val===0) return 'background:#f0eeea;color:var(--faint,#bab9b4)';
    var ratio = Math.pow(val/maxVal, 0.65);
    var r=Math.round(BR+ratio*(TR-BR)), g=Math.round(BG+ratio*(TG-BG)), b=Math.round(BB+ratio*(TB-BB));
    return 'background:rgb('+r+','+g+','+b+');color:'+(0.299*r+0.587*g+0.114*b<140?'#ffffff':'#28251d');
  }

  var days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var headerCells = '<th></th>';
  for (j=0;j<24;j++) headerCells += '<th>'+(j%2===0?String(j).padStart(2,'0')+'h':'')+'</th>';

  var bodyRows = days.map(function(dn,di){
    var cells = '<td class="hm-day-lbl">'+dn+'</td>';
    for (j=0;j<24;j++){
      var v=matrix[di][j];
      cells += '<td style="'+hmColor(v)+'" title="'+dn+' '+String(j).padStart(2,'0')+':00 \u2014 '+v+' breach(es)">'+(v>0?v:'')+'</td>';
    }
    return '<tr>'+cells+'</tr>';
  }).join('');

  var swatches = '';
  [0,0.2,0.4,0.6,0.8,1].forEach(function(ratio){
    swatches += '<span style="background:rgb('+Math.round(BR+ratio*(TR-BR))+','+Math.round(BG+ratio*(TG-BG))+','+Math.round(BB+ratio*(TB-BB))+')" ></span>';
  });

  return '<div class="sc">'+
    '<div class="sc-head"><h2>Breach Heatmap</h2>'+
    '<span class="badge">Day of week &times; Hour (EEST) &bull; '+parsed+' active breach rows</span>'+
    '</div><div class="sc-body"><div class="heatmap-wrap">'+
    '<table class="heatmap-table"><thead><tr>'+headerCells+'</tr></thead><tbody>'+bodyRows+'</tbody></table>'+
    '<div class="hm-legend"><span>Less</span><div class="hm-legend-swatch">'+swatches+'</div><span>More</span></div>'+
    '</div></div></div>';
}

/* ---- Overview — unique ticket counts per SLA ---- */
function _buildOverview(data){
  // Build per-SLA maps keyed by ticket to count uniques correctly
  var map = {};
  data.forEach(function(r){
    if (!map[r.sla]) map[r.sla] = { total: new Set(), active: new Set(), excl: new Set(), aos: new Set() };
    map[r.sla].total.add(r.ticket);
    if (r.excluded === 'N') {
      map[r.sla].active.add(r.ticket);
      if (r.isAos) map[r.sla].aos.add(r.ticket);
    } else {
      map[r.sla].excl.add(r.ticket);
    }
  });
  var rows = Object.keys(map).sort().map(function(k){
    var s = map[k];
    var tot = s.total.size, act = s.active.size;
    return '<tr>'+
      '<td>'+_chipSla(k)+'</td>'+
      '<td>'+tot+'</td>'+
      '<td>'+act+'</td>'+
      '<td>'+s.excl.size+'</td>'+
      '<td>'+s.aos.size+'</td>'+
      '<td>'+_pct(act,tot)+'</td>'+
    '</tr>';
  }).join('');
  var totalUniq = window.RPT.countUniqueTickets(data);
  return '<div class="sc"><div class="sc-head"><h2>SLA Overview</h2>'+
    '<span class="badge">'+totalUniq+' unique ticket(s)</span></div>'+
    '<div class="sc-body"><table class="dt"><thead><tr>'+
    '<th>SLA</th><th>Unique Total</th><th>Unique Active</th><th>Unique Excl</th><th>Unique AOS</th><th>Active%</th>'+
    '</tr></thead><tbody>'+(rows||'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--muted)">No data</td></tr>')+
    '</tbody></table></div></div>';
}

/* ---- Table + Pagination ---- */
// tabName is passed so the AOS tab can show the extra 'AOS Issue' column
function _buildTable(title, rows, tabName){
  var isAosTab = tabName === 'aos';
  var total     = rows.length;
  var uniqCount = window.RPT.countUniqueTickets(rows);
  var start = (_currentPage-1)*PAGE_SIZE;
  var page  = rows.slice(start, start+PAGE_SIZE);
  var colSpan = isAosTab ? 11 : 10;

  var trs = page.map(function(r){
    var aosIssueCell = isAosTab
      ? '<td style="color:var(--muted);font-size:11px">'+_esc(r.aosIssue)+'</td>'
      : '';
    return '<tr class="'+(r.excluded==='Y'?'excl':'')+'">'+
      '<td style="font-family:monospace;font-size:11px">'+_esc(r.ticket)+'</td>'+
      '<td>'+_esc(r.dateClosed)+'</td>'+
      '<td>'+_esc(r.dateTimeBreach)+'</td>'+
      '<td>'+_chipSla(r.sla)+'</td>'+
      '<td>'+_esc(r.tool)+'</td>'+
      '<td>'+_esc(r.reason)+'</td>'+
      '<td>'+_esc(r.language)+'</td>'+
      '<td>'+_esc(r.sheet)+'</td>'+
      '<td>'+(r.excluded==='Y'?'<span class="chip ch-other">Excl</span>':'')+'</td>'+
      '<td>'+(r.isAos?'<span class="chip ch-y">Y</span>':'')+'</td>'+
      aosIssueCell+
    '</tr>';
  }).join('');

  var aosIssueTh = isAosTab ? '<th>AOS Issue</th>' : '';
  // Badge shows unique tickets / total rows so both are visible
  var badge = uniqCount+' unique ticket'+(uniqCount!==1?'s':'')+
              (total !== uniqCount ? ' / '+total+' rows' : '');
  return '<div class="sc"><div class="sc-head"><h2>'+title+'</h2>'+
    '<span class="badge">'+badge+'</span></div>'+
    '<div class="sc-body"><table class="dt"><thead><tr>'+
    '<th>Ticket</th><th>Date Close (EEST)</th><th>Breach Time (EEST)</th>'+
    '<th>SLA</th><th>Tool</th><th>Reason</th><th>Lang</th><th>Sheet</th><th>Excl</th><th>AOS</th>'+
    aosIssueTh+
    '</tr></thead><tbody>'+(trs||'<tr><td colspan="'+colSpan+'" style="text-align:center;padding:20px;color:var(--muted)">No records</td></tr>')+
    '</tbody></table>'+_buildPg(total)+'</div></div>';
}
function _chipSla(sla){
  var map={'KSL-4':'ch-ksl4','KM-1':'ch-km1','KSL-5a':'ch-ksl5a','KM-2':'ch-km2'};
  return '<span class="chip '+(map[sla]||'ch-other')+'">'+_esc(sla)+'</span>';
}
function _buildPg(total){
  var pages=Math.ceil(total/PAGE_SIZE);
  if(pages<=1)return '';
  var btns='';
  for(var i=1;i<=Math.min(pages,10);i++){
    btns+='<button class="pg-btn'+(i===_currentPage?' on':'')+'" onclick="_goPage('+i+')">'+i+'</button>';
  }
  return '<div class="pg">'+
    '<button class="pg-btn" onclick="_goPage('+(_currentPage-1)+')" '+(_currentPage===1?'disabled':'')+'>&#8249;</button>'+
    btns+
    '<button class="pg-btn" onclick="_goPage('+(_currentPage+1)+')" '+(_currentPage===pages?'disabled':'')+'>&#8250;</button>'+
    '<span>'+((_currentPage-1)*PAGE_SIZE+1)+'&#8211;'+Math.min(_currentPage*PAGE_SIZE,total)+' of '+total+' rows</span>'+
  '</div>';
}
window._goPage=function(n){
  var data=window.RPT?window.RPT.filtered:[];
  _currentPage=Math.max(1,Math.min(n,Math.ceil(data.length/PAGE_SIZE)));
  _renderTab(_currentTab);
};

/* ---- Jira Tracker ---- */
// Shows one row per unique Jira ticket ID found in the filtered dataset.
// Only rows that have a non-empty Jira value are included (= excluded tickets).
function _buildJiraTracker(data) {
  // Collect unique Jira IDs and store representative row info
  var jiraMap = {};
  data.forEach(function(r) {
    if (!r.jira) return;
    if (!jiraMap[r.jira]) {
      jiraMap[r.jira] = {
        jira:    r.jira,
        ticket:  r.ticket,
        sla:     r.sla,
        tool:    r.tool,
        reason:  r.reason,
        comment: r.comment,
        week:    r.week,
      };
    }
  });

  var entries = Object.keys(jiraMap).sort().map(function(k){ return jiraMap[k]; });
  var count = entries.length;

  if (count === 0) {
    return '<div class="sc"><div class="sc-head"><h2>Jira Tracker</h2>'+
      '<span class="badge">0 tickets</span></div>'+
      '<div class="sc-body"><p style="color:var(--muted);font-size:12px;padding:20px 0">'+
      'No Jira ticket IDs found in the current filter. Jira IDs are only present on excluded rows.</p></div></div>';
  }

  // BMW Group Jira base URL — the ticket ID is appended directly after the trailing slash.
  var jiraBase = 'https://atc.bmwgroup.net/jira/browse';

  var trs = entries.map(function(e) {
    var href = jiraBase + '/' + _esc(e.jira);
    return '<tr>'+
      '<td><a class="jira-link" href="'+href+'" target="_blank" rel="noopener noreferrer">'+_esc(e.jira)+'</a></td>'+
      '<td style="font-family:monospace;font-size:11px">'+_esc(e.ticket)+'</td>'+
      '<td>'+_chipSla(e.sla)+'</td>'+
      '<td>'+_esc(e.tool)+'</td>'+
      '<td>'+_esc(e.reason)+'</td>'+
      '<td style="color:var(--muted);font-size:11px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+_esc(e.comment)+'">'+_esc(e.comment)+'</td>'+
      '<td style="text-align:center">'+_esc(e.week)+'</td>'+
    '</tr>';
  }).join('');

  return '<div class="sc"><div class="sc-head"><h2>Jira Tracker</h2>'+
    '<span class="badge">'+count+' unique Jira ticket'+(count!==1?'s':'')+'</span></div>'+
    '<div class="sc-body"><table class="dt"><thead><tr>'+
    '<th>Jira ID</th><th>INC Ticket</th><th>SLA</th><th>Tool</th><th>Reason</th><th>Comment</th><th>Week</th>'+
    '</tr></thead><tbody>'+trs+
    '</tbody></table></div></div>';
}
</script>

<script src="reporter-processor.js"></script>
<script src="reporter-exporter.js"></script>

<script>
(function(){
  var fi  = document.getElementById('rpt-file-input');
  var btn = document.getElementById('import-btn');
  var dz  = document.getElementById('drop-zone');
  var cb  = document.getElementById('rpt-clear-btn');

  function loadFiles(fileList) {
    var files = Array.from(fileList).filter(function(f){ return /\.xlsx$/i.test(f.name); });
    var rejected = Array.from(fileList).length - files.length;
    if (!files.length) { setStatus('Only .xlsx files are accepted.', true); return; }
    var msg = 'Loading ' + files.length + ' file(s)\u2026';
    if (rejected > 0) msg += ' (' + rejected + ' non-xlsx skipped)';
    setStatus(msg, false);
    window.RPT.loadFiles(files);
  }

  function setStatus(msg, err) {
    var el = document.getElementById('upload-status');
    el.textContent = msg;
    el.className = err ? 'err' : 'ok';
  }

  btn.addEventListener('click', function(){ fi.click(); });
  fi.addEventListener('change', function(e){ loadFiles(e.target.files); fi.value=''; });

  cb.addEventListener('click', function(){
    if (confirm('Clear all loaded data and start fresh?')) {
      window.RPT.clearData();
      setStatus('', false);
    }
  });

  dz.addEventListener('click', function(){ fi.click(); });
  dz.addEventListener('dragover',  function(e){ e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', function(){ dz.classList.remove('drag-over'); });
  dz.addEventListener('drop', function(e){
    e.preventDefault();
    dz.classList.remove('drag-over');
    loadFiles(e.dataTransfer.files);
  });
})();
</script>
